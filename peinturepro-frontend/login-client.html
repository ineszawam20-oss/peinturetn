<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>PeinturePro TN — Espace Client</title>
  <link rel="stylesheet" href="/css/main.css"/>
  <style>
body {
  min-height: 100vh;
  display: flex;
  align-items: center;
  justify-content: center;
  background: var(--surface);
  overflow-y: auto;
  padding: 2rem 1rem;
}
    body::before {
      content: '';
      position: fixed;
      inset: 0;
      background:
        radial-gradient(ellipse 60% 50% at 15% 20%, rgba(200,68,26,.07) 0%, transparent 60%),
        radial-gradient(ellipse 50% 40% at 85% 80%, rgba(232,160,32,.06) 0%, transparent 60%);
      pointer-events: none;
    }

    .login-card {
      width: 100%;
      max-width: 450px;
      background: var(--white);
      border-radius: var(--radius-lg);
      box-shadow: var(--shadow-lg);
      padding: 2.75rem;
      animation: slideUp .5s cubic-bezier(.16,1,.3,1) both;
      position: relative;
      z-index: 1;
    }

    .card-brand {
      display: flex;
      align-items: center;
      gap: .65rem;
      margin-bottom: 2rem;
    }
    .brand-icon {
      width: 40px; height: 40px;
      background: var(--primary);
      border-radius: var(--radius-sm);
      display: flex; align-items: center; justify-content: center;
    }
    .brand-icon svg { width: 22px; height: 22px; fill: white; }
    .brand-text { font-family: var(--font-display); font-size: 1.1rem; color: var(--dark); }
    .brand-text span { color: var(--primary); }

    .client-badge {
      display: inline-flex;
      align-items: center;
      gap: .4rem;
      background: var(--primary-light);
      color: var(--primary);
      font-size: .75rem;
      font-weight: 600;
      letter-spacing: .06em;
      text-transform: uppercase;
      padding: .3rem .85rem;
      border-radius: 30px;
      margin-bottom: 1.25rem;
    }

    .card-title {
      font-family: var(--font-display);
      font-size: 1.75rem;
      color: var(--dark);
      margin-bottom: .35rem;
    }
    .card-subtitle {
      color: var(--text-muted);
      font-size: .88rem;
      margin-bottom: 1.75rem;
    }

    /* Onglets */
    .tabs {
      display: flex;
      border-bottom: 1.5px solid var(--border);
      margin-bottom: 1.75rem;
    }
    .tab-btn {
      flex: 1;
      padding: .7rem;
      background: none;
      border: none;
      border-bottom: 2.5px solid transparent;
      margin-bottom: -1.5px;
      font-family: var(--font-body);
      font-size: .9rem;
      font-weight: 500;
      color: var(--text-muted);
      cursor: pointer;
      transition: color .2s, border-color .2s;
    }
    .tab-btn.active { color: var(--primary); border-bottom-color: var(--primary); }

    .tab-panel { display: none; }
    .tab-panel.active { display: block; }

    /* Input icône */
    .input-icon { position: relative; }
    .input-icon .icon {
      position: absolute;
      left: .95rem; top: 50%;
      transform: translateY(-50%);
      color: var(--text-muted);
      pointer-events: none;
    }
    .input-icon .form-control { padding-left: 2.6rem; }
    .toggle-pass {
      position: absolute;
      right: .95rem; top: 50%;
      transform: translateY(-50%);
      cursor: pointer;
      color: var(--text-muted);
      background: none; border: none;
      padding: 0; line-height: 1;
    }

    .row-2 { display: grid; grid-template-columns: 1fr 1fr; gap: .75rem; }
    .btn-submit { width: 100%; padding: .9rem; font-size: 1rem; }

    .switch-link {
      text-align: center;
      margin-top: 1.5rem;
      font-size: .85rem;
      color: var(--text-muted);
    }
    .switch-link a { color: var(--primary); font-weight: 600; text-decoration: none; }

    /* Force mot de passe */
    .strength-bar { height: 4px; border-radius: 2px; background: var(--border); margin-top: .45rem; overflow: hidden; }
    .strength-fill { height: 100%; border-radius: 2px; transition: width .3s, background .3s; width: 0; }
    .strength-label { font-size: .73rem; color: var(--text-muted); margin-top: .25rem; }
    .pw-rules { list-style: none; margin-top: .5rem; display: none; }
    .pw-rules li {
      font-size: .75rem; color: var(--text-muted);
      display: flex; align-items: center; gap: .35rem;
      margin-bottom: .2rem; transition: color .2s;
    }
    .pw-rules li.ok { color: #1D6A42; }
    .pw-rules li::before { content: '○'; font-size: .6rem; }
    .pw-rules li.ok::before { content: '✓'; }

    @media (max-width: 520px) {
      .login-card { padding: 2rem 1.5rem; }
      .row-2 { grid-template-columns: 1fr; }
    }
  </style>
</head>
<body>
  <a href="/index.html" style="
  position: fixed;
  top: 1.25rem;
  left: 1.25rem;
  display: inline-flex;
  align-items: center;
  gap: .4rem;
  font-size: .83rem;
  color: var(--text-muted);
  text-decoration: none;
  background: var(--white);
  border: 1.5px solid var(--border);
  border-radius: var(--radius-sm);
  padding: .4rem .9rem;
  box-shadow: var(--shadow-sm);
  transition: all .2s;
  z-index: 99;
" onmouseover="this.style.color='var(--primary)';this.style.borderColor='var(--primary)'"
   onmouseout="this.style.color='var(--text-muted)';this.style.borderColor='var(--border)'">
  <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5">
    <polyline points="15 18 9 12 15 6"/>
  </svg>
  Retour
</a>
  <div class="login-card">
    <div class="card-brand">
      <div class="brand-icon">
        <svg viewBox="0 0 24 24"><path d="M7 14c0 1.1.9 2 2 2h2v-4H9c-1.1 0-2 .9-2 2zm10-9h-1V3h-2v2H10V3H8v2H7C5.9 5 5 5.9 5 7v12c0 1.1.9 2 2 2h10c1.1 0 2-.9 2-2V7c0-1.1-.9-2-2-2zm0 14H7V9h10v10z"/></svg>
      </div>
      <span class="brand-text">PeinturePro <span>TN</span></span>
    </div>

    <span class="client-badge">👤 Espace Client</span>

    <div class="tabs">
      <button class="tab-btn active" onclick="switchTab('login')">Se connecter</button>
      <button class="tab-btn" onclick="switchTab('register')">Créer un compte</button>
    </div>

    <div class="alert alert-error" id="alertError">⚠️ <span id="alertMsg"></span></div>
    <div class="alert alert-success" id="alertSuccess">✓ <span id="alertSuccessMsg"></span></div>

    <!-- Connexion -->
    <div class="tab-panel active" id="panel-login">
      <div class="form-group">
        <label>E-mail</label>
        <div class="input-icon">
          <svg class="icon" width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
            <path d="M4 4h16c1.1 0 2 .9 2 2v12c0 1.1-.9 2-2 2H4c-1.1 0-2-.9-2-2V6c0-1.1.9-2 2-2z"/>
            <polyline points="22,6 12,13 2,6"/>
          </svg>
          <input type="email" class="form-control" id="loginEmail" placeholder="votre@email.tn"/>
        </div>
      </div>
      <div class="form-group">
        <label>Mot de passe</label>
        <div class="input-icon">
          <svg class="icon" width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
            <rect x="3" y="11" width="18" height="11" rx="2"/><path d="M7 11V7a5 5 0 0 1 10 0v4"/>
          </svg>
          <input type="password" class="form-control" id="loginPassword" placeholder="••••••••"/>
          <button class="toggle-pass" onclick="togglePass('loginPassword')">
            <svg width="15" height="15" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
              <path d="M1 12s4-8 11-8 11 8 11 8-4 8-11 8-11-8-11-8z"/><circle cx="12" cy="12" r="3"/>
            </svg>
          </button>
        </div>
      </div>
      <div style="text-align:right; margin-top:-.6rem; margin-bottom:1.2rem;">
        <a href="/forgot-password.html" style="font-size:.82rem; color:var(--primary); text-decoration:none;">
          Mot de passe oublié ?
        </a>
      </div>
      <button class="btn-primary btn-submit" id="loginBtn" onclick="handleLogin()">Connexion</button>
      <div class="switch-link">
        Accès équipe ? <a href="/login-admin.html">Portail professionnel →</a>
      </div>
    </div>

    <!-- Inscription -->
    <div class="tab-panel" id="panel-register">
      <div class="row-2">
        <div class="form-group">
          <label>Nom</label>
          <input type="text" class="form-control" id="regNom" placeholder="Ben Ali"/>
        </div>
        <div class="form-group">
          <label>Prénom</label>
          <input type="text" class="form-control" id="regPrenom" placeholder="Mohamed"/>
        </div>
      </div>
      <div class="form-group">
        <label>E-mail</label>
        <div class="input-icon">
          <svg class="icon" width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
            <path d="M4 4h16c1.1 0 2 .9 2 2v12c0 1.1-.9 2-2 2H4c-1.1 0-2-.9-2-2V6c0-1.1.9-2 2-2z"/>
            <polyline points="22,6 12,13 2,6"/>
          </svg>
          <input type="email" class="form-control" id="regEmail" placeholder="votre@email.tn"/>
        </div>
      </div>
      <div class="form-group">
        <label>Téléphone</label>
        <input type="tel" class="form-control" id="regTel" placeholder="+216 XX XXX XXX"/>
      </div>
      <div class="form-group">
        <label>Adresse</label>
        <input type="text" class="form-control" id="regAdresse" placeholder="Rue, Ville, Gouvernorat"/>
      </div>
      <div class="form-group">
        <label>Mot de passe</label>
        <div class="input-icon">
          <svg class="icon" width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
            <rect x="3" y="11" width="18" height="11" rx="2"/><path d="M7 11V7a5 5 0 0 1 10 0v4"/>
          </svg>
          <input type="password" class="form-control" id="regPassword"
                 placeholder="••••••••" oninput="checkStrength(this.value)"/>
          <button class="toggle-pass" onclick="togglePass('regPassword')">
            <svg width="15" height="15" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
              <path d="M1 12s4-8 11-8 11 8 11 8-4 8-11 8-11-8-11-8z"/><circle cx="12" cy="12" r="3"/>
            </svg>
          </button>
        </div>
        <div class="strength-bar"><div class="strength-fill" id="strengthFill"></div></div>
        <div class="strength-label" id="strengthLabel"></div>
        <ul class="pw-rules" id="pwRules">
          <li id="rule-len">8 caractères minimum</li>
          <li id="rule-upper">1 lettre majuscule</li>
          <li id="rule-lower">1 lettre minuscule</li>
          <li id="rule-num">1 chiffre</li>
          <li id="rule-spec">1 caractère spécial</li>
        </ul>
      </div>
      <button class="btn-primary btn-submit" id="registerBtn" onclick="handleRegister()">
        Créer mon compte
      </button>
    </div>
  </div>

  <script>
    const API_URL = 'http://localhost:3000/api';

    function switchTab(tab) {
      document.querySelectorAll('.tab-btn').forEach((b, i) =>
        b.classList.toggle('active', (i===0&&tab==='login')||(i===1&&tab==='register'))
      );
      document.querySelectorAll('.tab-panel').forEach(p => p.classList.remove('active'));
      document.getElementById('panel-'+tab).classList.add('active');
      clearAlerts();
    }

    function togglePass(id) {
      const el = document.getElementById(id);
      el.type = el.type === 'password' ? 'text' : 'password';
    }

    function showError(msg) {
      document.getElementById('alertMsg').textContent = msg;
      document.getElementById('alertError').classList.add('show');
      document.getElementById('alertSuccess').classList.remove('show');
    }
    function showSuccess(msg) {
      document.getElementById('alertSuccessMsg').textContent = msg;
      document.getElementById('alertSuccess').classList.add('show');
      document.getElementById('alertError').classList.remove('show');
    }
    function clearAlerts() {
      document.getElementById('alertError').classList.remove('show');
      document.getElementById('alertSuccess').classList.remove('show');
    }

    async function handleLogin() {
      const email    = document.getElementById('loginEmail').value.trim();
      const password = document.getElementById('loginPassword').value;
      const btn      = document.getElementById('loginBtn');
      clearAlerts();
      if (!email || !password) { showError('Veuillez remplir tous les champs.'); return; }

      btn.innerHTML = '<span class="spinner"></span>Connexion…';
      btn.disabled  = true;
      try {
        const res  = await fetch(`${API_URL}/auth/login`, {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ email, password, role: 'client' })
        });
        const data = await res.json();
        if (!res.ok) { showError(data.message || 'Identifiants incorrects.'); return; }

        localStorage.setItem('token',        data.token);
        localStorage.setItem('refreshToken', data.refreshToken);
        localStorage.setItem('user',         JSON.stringify(data.user));
        localStorage.setItem('role',         data.user.role);
        window.location.href = '/client/catalogue.html';
      } catch { showError('Erreur serveur. Réessayez.'); }
      finally  { btn.innerHTML = 'Connexion'; btn.disabled = false; }
    }

    async function handleRegister() {
      const nom      = document.getElementById('regNom').value.trim();
      const prenom   = document.getElementById('regPrenom').value.trim();
      const email    = document.getElementById('regEmail').value.trim();
      const tel      = document.getElementById('regTel').value.trim();
      const adresse  = document.getElementById('regAdresse').value.trim();
      const password = document.getElementById('regPassword').value;
      const btn      = document.getElementById('registerBtn');
      clearAlerts();

      if (!nom || !prenom || !email || !password) { showError('Champs obligatoires manquants.'); return; }
      if (!validatePassword(password)) { showError('Mot de passe trop faible.'); return; }

      btn.innerHTML = '<span class="spinner"></span>Création…';
      btn.disabled  = true;
      try {
        const res  = await fetch(`${API_URL}/auth/register`, {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ nom: `${prenom} ${nom}`, email, telephone: tel, adresse, password, role: 'client' })
        });
        const data = await res.json();
        if (!res.ok) { showError(data.message || 'Erreur inscription.'); return; }
        showSuccess('Compte créé ! Vous pouvez vous connecter.');
        setTimeout(() => switchTab('login'), 2500);
      } catch { showError('Erreur serveur. Réessayez.'); }
      finally  { btn.innerHTML = 'Créer mon compte'; btn.disabled = false; }
    }

    function checkStrength(pw) {
      const rules = {
        len: pw.length >= 8, upper: /[A-Z]/.test(pw),
        lower: /[a-z]/.test(pw), num: /[0-9]/.test(pw),
        spec: /[^A-Za-z0-9]/.test(pw)
      };
      Object.entries(rules).forEach(([k, ok]) => {
        document.getElementById('rule-'+k)?.classList.toggle('ok', ok);
      });
      document.getElementById('pwRules').style.display = pw ? 'block' : 'none';
      const score = Object.values(rules).filter(Boolean).length;
      const cfg = [
        {w:'0%',bg:'',txt:''},
        {w:'20%',bg:'#E53E3E',txt:'Très faible'},
        {w:'40%',bg:'#DD6B20',txt:'Faible'},
        {w:'60%',bg:'#D69E2E',txt:'Moyen'},
        {w:'80%',bg:'#38A169',txt:'Fort'},
        {w:'100%',bg:'var(--primary)',txt:'Très fort ✓'}
      ][score];
      document.getElementById('strengthFill').style.cssText = `width:${cfg.w}; background:${cfg.bg}`;
      document.getElementById('strengthLabel').textContent  = cfg.txt;
    }

    function validatePassword(pw) {
      return pw.length >= 8 && /[A-Z]/.test(pw) && /[a-z]/.test(pw) &&
             /[0-9]/.test(pw) && /[^A-Za-z0-9]/.test(pw);
    }

    document.addEventListener('keydown', e => {
      if (e.key !== 'Enter') return;
      const active = document.querySelector('.tab-panel.active').id;
      if (active === 'panel-login')    handleLogin();
      if (active === 'panel-register') handleRegister();
    });
  </script>
</body>
</html>
