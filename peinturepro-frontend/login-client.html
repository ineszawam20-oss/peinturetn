<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>PeinturePro TN — Espace Client</title>
  <!-- Google Fonts + Material Icons -->
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&family=Poppins:wght@400;500;600;700;800&display=swap" rel="stylesheet">
  <link href="https://fonts.googleapis.com/icon?family=Material+Icons" rel="stylesheet">
  <style>
    /* ===== THÈME MODERNE (identique à l'accueil) ===== */
    :root {
      --bg-dark: #0a0a1a;
      --bg-surface: #0f0f1f;
      --primary: #6366f1;
      --primary-dark: #4f46e5;
      --primary-light: #818cf8;
      --accent: #f59e0b;
      --accent-glow: #fbbf24;
      --success: #10b981;
      --text-white: #ffffff;
      --text-gray: #a1a1aa;
      --card-bg: rgba(255, 255, 255, 0.03);
      --border-glow: rgba(99, 102, 241, 0.3);
      --gradient-hero: linear-gradient(135deg, #6366f1 0%, #a855f7 50%, #ec4899 100%);
      --gradient-card: linear-gradient(135deg, rgba(99, 102, 241, 0.1) 0%, rgba(168, 85, 247, 0.1) 100%);
      --shadow-glow: 0 0 30px rgba(99, 102, 241, 0.3);
      --radius-lg: 24px;
      --radius-md: 16px;
      --radius-sm: 12px;
      --font-display: 'Poppins', system-ui, -apple-system, sans-serif;
      --font-body: 'Inter', system-ui, -apple-system, sans-serif;
    }

    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    body {
      min-height: 100vh;
      background: var(--bg-dark);
      font-family: var(--font-body);
      color: var(--text-white);
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 2rem 1rem;
      position: relative;
      overflow-x: hidden;
    }

    /* Décors de fond (cercles animés) */
    .deco-bg {
      position: fixed;
      inset: 0;
      pointer-events: none;
      z-index: 0;
    }
    .deco-bg svg {
      width: 100%;
      height: 100%;
      animation: rotateSlow 30s linear infinite;
    }
    @keyframes rotateSlow {
      from { transform: rotate(0deg); }
      to { transform: rotate(360deg); }
    }

    /* Carte principale (glassmorphism) */
    .login-card {
      width: 100%;
      max-width: 520px;
      background: var(--bg-surface);
      backdrop-filter: blur(12px);
      border: 1px solid rgba(99, 102, 241, 0.3);
      border-radius: var(--radius-lg);
      padding: 2.5rem;
      box-shadow: 0 20px 40px rgba(0, 0, 0, 0.5), var(--shadow-glow);
      position: relative;
      z-index: 2;
      transition: transform 0.3s ease;
    }
    .login-card:hover {
      transform: translateY(-5px);
    }

    /* Logo + marque */
    .card-brand {
      display: flex;
      align-items: center;
      gap: 0.75rem;
      margin-bottom: 1.8rem;
    }
    .logo-image {
      height: 45px;
      width: auto;
      filter: drop-shadow(0 0 10px rgba(99, 102, 241, 0.5));
      transition: all 0.3s ease;
    }
    .logo-image:hover {
      filter: drop-shadow(0 0 20px var(--primary));
      transform: scale(1.05);
    }
    .brand-text {
      font-family: var(--font-display);
      font-size: 1.2rem;
      font-weight: 600;
      background: linear-gradient(135deg, var(--text-white), var(--primary-light));
      -webkit-background-clip: text;
      background-clip: text;
      color: transparent;
    }
    .brand-text span {
      background: linear-gradient(135deg, var(--accent), var(--accent-glow));
      -webkit-background-clip: text;
      background-clip: text;
      color: transparent;
    }

    /* Badge client */
    .client-badge {
      display: inline-flex;
      align-items: center;
      gap: 0.5rem;
      background: rgba(99, 102, 241, 0.2);
      border: 1px solid var(--primary);
      color: var(--primary-light);
      font-size: 0.75rem;
      font-weight: 600;
      letter-spacing: 0.06em;
      text-transform: uppercase;
      padding: 0.3rem 1rem;
      border-radius: 40px;
      margin-bottom: 1.5rem;
      backdrop-filter: blur(5px);
    }
    .client-badge .material-icons {
      font-size: 16px;
    }

    /* Onglets */
    .tabs {
      display: flex;
      gap: 1rem;
      border-bottom: 1px solid rgba(99, 102, 241, 0.3);
      margin-bottom: 1.8rem;
    }
    .tab-btn {
      background: none;
      border: none;
      padding: 0.6rem 0;
      font-family: var(--font-body);
      font-size: 1rem;
      font-weight: 600;
      color: var(--text-gray);
      cursor: pointer;
      transition: all 0.2s;
      position: relative;
      flex: 1;
      text-align: center;
    }
    .tab-btn.active {
      color: var(--primary-light);
    }
    .tab-btn.active::after {
      content: '';
      position: absolute;
      bottom: -1px;
      left: 0;
      width: 100%;
      height: 2px;
      background: linear-gradient(90deg, var(--primary), var(--accent));
      border-radius: 2px;
    }
    .tab-btn:hover:not(.active) {
      color: var(--text-white);
    }

    /* Panneaux */
    .tab-panel {
      display: none;
      animation: fadeIn 0.3s ease;
    }
    .tab-panel.active {
      display: block;
    }
    @keyframes fadeIn {
      from { opacity: 0; transform: translateY(8px); }
      to { opacity: 1; transform: translateY(0); }
    }

    /* Formulaires */
    .form-group {
      margin-bottom: 1.4rem;
    }
    .form-group label {
      display: block;
      font-size: 0.8rem;
      font-weight: 500;
      margin-bottom: 0.4rem;
      color: var(--text-gray);
      letter-spacing: 0.03em;
    }
    .input-icon {
      position: relative;
    }
    .input-icon .material-icons {
      position: absolute;
      left: 1rem;
      top: 50%;
      transform: translateY(-50%);
      font-size: 20px;
      color: var(--text-gray);
      pointer-events: none;
    }
.form-control {
    width: 100%;
    background: #0a0a1a;
      border: 1.5px solid rgba(99, 102, 241, 0.3);
      border-radius: var(--radius-sm);
      padding: 0.85rem 1rem 0.85rem 2.8rem;
      font-family: var(--font-body);
      font-size: 0.9rem;
      color: var(--text-white);
      transition: all 0.3s ease;
    }
    .form-control:focus {
      outline: none;
      border-color: var(--primary);
      box-shadow: 0 0 0 3px rgba(99, 102, 241, 0.2);
      background: rgba(255, 255, 255, 0.08);
    }
    .form-control::placeholder {
      color: rgba(161, 161, 170, 0.6);
    }
    .toggle-pass {
      position: absolute;
      right: 1rem;
      top: 50%;
      transform: translateY(-50%);
      background: none;
      border: none;
      cursor: pointer;
      color: var(--text-gray);
      display: flex;
      align-items: center;
      padding: 0;
    }
    .toggle-pass .material-icons {
      position: static;
      transform: none;
      font-size: 20px;
    }

    /* Grille deux colonnes */
    .row-2 {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 0.8rem;
    }

    /* Alertes */
    .alert {
      background: rgba(239, 68, 68, 0.15);
      border-left: 3px solid #ef4444;
      border-radius: var(--radius-sm);
      padding: 0.75rem 1rem;
      margin-bottom: 1.5rem;
      font-size: 0.85rem;
      color: #fca5a5;
      display: none;
      align-items: center;
      gap: 0.5rem;
    }
    .alert-success {
      background: rgba(16, 185, 129, 0.15);
      border-left-color: var(--success);
      color: #6ee7b7;
    }
    .alert.show {
      display: flex;
    }

    /* Boutons */
    .btn-submit {
      width: 100%;
      background: linear-gradient(135deg, var(--primary), var(--primary-dark));
      border: none;
      border-radius: var(--radius-sm);
      padding: 0.9rem;
      font-family: var(--font-body);
      font-size: 1rem;
      font-weight: 600;
      color: white;
      cursor: pointer;
      transition: all 0.3s ease;
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 0.5rem;
    }
    .btn-submit:hover {
      transform: translateY(-2px);
      box-shadow: 0 8px 20px rgba(99, 102, 241, 0.5);
      background: linear-gradient(135deg, var(--primary-dark), var(--primary));
    }
    .btn-submit:disabled {
      opacity: 0.7;
      transform: none;
      cursor: not-allowed;
    }
    .spinner {
      display: inline-block;
      width: 18px;
      height: 18px;
      border: 2px solid rgba(255,255,255,0.3);
      border-radius: 50%;
      border-top-color: white;
      animation: spin 0.6s linear infinite;
    }
    @keyframes spin { to { transform: rotate(360deg); } }

    /* Liens */
    .forgot-link {
      text-align: right;
      margin-top: -0.5rem;
      margin-bottom: 1.2rem;
    }
    .forgot-link a {
      font-size: 0.8rem;
      color: var(--primary-light);
      text-decoration: none;
      transition: color 0.2s;
    }
    .forgot-link a:hover {
      color: var(--accent);
      text-decoration: underline;
    }
    .switch-link {
      text-align: center;
      margin-top: 1.5rem;
      font-size: 0.85rem;
      color: var(--text-gray);
    }
    .switch-link a {
      color: var(--primary-light);
      font-weight: 600;
      text-decoration: none;
      transition: color 0.2s;
    }
    .switch-link a:hover {
      color: var(--accent);
      text-decoration: underline;
    }

    /* Force mot de passe (style sombre) */
    .strength-bar {
      height: 4px;
      border-radius: 2px;
      background: rgba(255, 255, 255, 0.1);
      margin-top: 0.5rem;
      overflow: hidden;
    }
    .strength-fill {
      height: 100%;
      border-radius: 2px;
      transition: width 0.3s, background 0.3s;
      width: 0;
    }
    .strength-label {
      font-size: 0.7rem;
      color: var(--text-gray);
      margin-top: 0.25rem;
    }
    .pw-rules {
      list-style: none;
      margin-top: 0.6rem;
      display: none;
      background: rgba(0,0,0,0.3);
      padding: 0.6rem 1rem;
      border-radius: var(--radius-sm);
    }
    .pw-rules li {
      font-size: 0.7rem;
      color: var(--text-gray);
      display: flex;
      align-items: center;
      gap: 0.4rem;
      margin-bottom: 0.2rem;
      transition: color 0.2s;
    }
    .pw-rules li.ok {
      color: var(--success);
    }
    .pw-rules li::before {
      content: '○';
      font-size: 0.6rem;
    }
    .pw-rules li.ok::before {
      content: '✓';
    }

    /* Bouton retour */
    .back-home {
      position: fixed;
      top: 1.5rem;
      left: 1.5rem;
      display: inline-flex;
      align-items: center;
      gap: 0.4rem;
      background: rgba(15, 15, 31, 0.8);
      backdrop-filter: blur(8px);
      border: 1px solid rgba(99, 102, 241, 0.4);
      border-radius: var(--radius-sm);
      padding: 0.5rem 1rem;
      font-size: 0.85rem;
      color: var(--text-gray);
      text-decoration: none;
      transition: all 0.2s;
      z-index: 100;
      font-weight: 500;
    }
    .back-home:hover {
      border-color: var(--primary);
      color: var(--primary-light);
      transform: translateY(-2px);
    }

    /* Responsive */
    @media (max-width: 560px) {
      .login-card { padding: 1.8rem; }
      .row-2 { grid-template-columns: 1fr; gap: 0; }
    }
  </style>

<body>

<!-- Décors de fond -->
<div class="deco-bg">
  <svg viewBox="0 0 1200 800" preserveAspectRatio="xMidYMid slice">
    <circle cx="200" cy="200" r="400" fill="none" stroke="rgba(255,255,255,.02)" stroke-width="1"/>
    <circle cx="1000" cy="600" r="350" fill="none" stroke="rgba(255,255,255,.02)" stroke-width="1"/>
    <circle cx="600" cy="400" r="550" fill="none" stroke="rgba(255,255,255,.01)" stroke-width="1"/>
    <ellipse cx="150" cy="650" rx="200" ry="80" fill="rgba(99,102,241,.05)" transform="rotate(-15,150,650)"/>
    <ellipse cx="1050" cy="150" rx="180" ry="70" fill="rgba(168,85,247,.05)" transform="rotate(20,1050,150)"/>
  </svg>
</div>

<!-- Bouton retour fixe -->
<a href="/index.html" class="back-home">
  <span class="material-icons" style="font-size: 18px;">arrow_back</span>
  Retour
</a>

<div class="login-card">
  <!-- Logo + marque (identique à la navbar) -->
  <div class="card-brand">
    <img src="images/logo.png" alt="PeinturePro TN" class="logo-image">
  </div>

  <span class="client-badge">
    <span class="material-icons">person_outline</span>
    Espace Client
  </span>

  <div class="tabs">
    <button class="tab-btn active" onclick="switchTab('login')">Se connecter</button>
    <button class="tab-btn" onclick="switchTab('register')">Créer un compte</button>
  </div>

  <div class="alert alert-error" id="alertError">
    <span class="material-icons" style="font-size: 18px;">error_outline</span>
    <span id="alertMsg"></span>
  </div>
  <div class="alert alert-success" id="alertSuccess">
    <span class="material-icons" style="font-size: 18px;">check_circle</span>
    <span id="alertSuccessMsg"></span>
  </div>

  <!-- Panneau Connexion -->
  <div class="tab-panel active" id="panel-login">
    <div class="form-group">
      <label>E-mail</label>
      <div class="input-icon">
        <span class="material-icons">email</span>
        <input type="email" class="form-control" id="loginEmail" placeholder="votre@email.tn">
      </div>
    </div>
    <div class="form-group">
      <label>Mot de passe</label>
      <div class="input-icon">
        <span class="material-icons">lock</span>
        <input type="password" class="form-control" id="loginPassword" placeholder="••••••••">
        <button class="toggle-pass" type="button" onclick="togglePass('loginPassword')">
          <span class="material-icons">visibility</span>
        </button>
      </div>
    </div>
    <div class="forgot-link">
      <a href="/forgot-password.html">Mot de passe oublié ?</a>
    </div>
    <button class="btn-submit" id="loginBtn" onclick="handleLogin()">Connexion</button>
    <div class="switch-link">
      Accès équipe ? <a href="/login-admin.html">Portail professionnel →</a>
    </div>
  </div>

  <!-- Panneau Inscription -->
  <div class="tab-panel" id="panel-register">
    <div class="row-2">
      <div class="form-group">
        <label>Nom</label>
        <input type="text" class="form-control" id="regNom" placeholder="Ben Ali">
      </div>
      <div class="form-group">
        <label>Prénom</label>
        <input type="text" class="form-control" id="regPrenom" placeholder="Mohamed">
      </div>
    </div>
    <div class="form-group">
      <label>E-mail</label>
      <div class="input-icon">
        <span class="material-icons">email</span>
        <input type="email" class="form-control" id="regEmail" placeholder="votre@email.tn">
      </div>
    </div>
    <div class="form-group">
      <label>Téléphone</label>
      <div class="input-icon">
        <span class="material-icons">phone</span>
        <input type="tel" class="form-control" id="regTel" placeholder="+216 XX XXX XXX">
      </div>
    </div>
    <div class="form-group">
      <label>Adresse</label>
      <div class="input-icon">
        <span class="material-icons">home</span>
        <input type="text" class="form-control" id="regAdresse" placeholder="Rue, Ville, Gouvernorat">
      </div>
    </div>
    <div class="form-group">
      <label>Mot de passe</label>
      <div class="input-icon">
        <span class="material-icons">lock_outline</span>
        <input type="password" class="form-control" id="regPassword" placeholder="••••••••" oninput="checkStrength(this.value)">
        <button class="toggle-pass" type="button" onclick="togglePass('regPassword')">
          <span class="material-icons">visibility</span>
        </button>
      </div>
      <div class="strength-bar"><div class="strength-fill" id="strengthFill"></div></div>
      <div class="strength-label" id="strengthLabel"></div>
      <ul class="pw-rules" id="pwRules">
        <li id="rule-len">8 caractères minimum</li>
        <li id="rule-upper">1 lettre majuscule</li>
        <li id="rule-lower">1 lettre minuscule</li>
        <li id="rule-num">1 chiffre</li>
        <li id="rule-spec">1 caractère spécial</li>
      </ul>
    </div>
    <button class="btn-submit" id="registerBtn" onclick="handleRegister()">Créer mon compte</button>
  </div>
</div>

<script>
  const API_URL = window.location.origin + '/api';

  function switchTab(tab) {
    document.querySelectorAll('.tab-btn').forEach((btn, idx) => {
      const isActive = (idx === 0 && tab === 'login') || (idx === 1 && tab === 'register');
      btn.classList.toggle('active', isActive);
    });
    document.querySelectorAll('.tab-panel').forEach(panel => panel.classList.remove('active'));
    document.getElementById(`panel-${tab}`).classList.add('active');
    clearAlerts();
  }

  function togglePass(id) {
    const input = document.getElementById(id);
    const icon = input.parentElement.querySelector('.toggle-pass .material-icons');
    if (input.type === 'password') {
      input.type = 'text';
      icon.textContent = 'visibility_off';
    } else {
      input.type = 'password';
      icon.textContent = 'visibility';
    }
  }

  function clearAlerts() {
    document.getElementById('alertError').classList.remove('show');
    document.getElementById('alertSuccess').classList.remove('show');
  }

  function showError(msg) {
    const alertBox = document.getElementById('alertError');
    document.getElementById('alertMsg').innerText = msg;
    alertBox.classList.add('show');
    document.getElementById('alertSuccess').classList.remove('show');
  }

  function showSuccess(msg) {
    const alertBox = document.getElementById('alertSuccess');
    document.getElementById('alertSuccessMsg').innerText = msg;
    alertBox.classList.add('show');
    document.getElementById('alertError').classList.remove('show');
  }

  // Connexion
  async function handleLogin() {
    const email = document.getElementById('loginEmail').value.trim();
    const password = document.getElementById('loginPassword').value;
    const btn = document.getElementById('loginBtn');
    clearAlerts();

    if (!email || !password) {
      showError('Veuillez remplir tous les champs.');
      return;
    }

    btn.innerHTML = '<span class="spinner"></span> Connexion...';
    btn.disabled = true;

    try {
      const res = await fetch(`${API_URL}/auth/login`, {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ email, password, role: 'client' })
      });
      const data = await res.json();
      if (!res.ok) {
        showError(data.message || 'Identifiants incorrects.');
        return;
      }

      localStorage.setItem('token', data.token);
      localStorage.setItem('refreshToken', data.refreshToken);
      localStorage.setItem('user', JSON.stringify(data.user));
      localStorage.setItem('role', data.user.role);
      window.location.href = '/client/catalogue.html';
    } catch (err) {
      showError('Erreur de connexion au serveur. Vérifiez que l’API est démarrée.');
    } finally {
      btn.innerHTML = 'Connexion';
      btn.disabled = false;
    }
  }

  // Inscription
  async function handleRegister() {
    const nom = document.getElementById('regNom').value.trim();
    const prenom = document.getElementById('regPrenom').value.trim();
    const email = document.getElementById('regEmail').value.trim();
    const tel = document.getElementById('regTel').value.trim();
    const adresse = document.getElementById('regAdresse').value.trim();
    const password = document.getElementById('regPassword').value;
    const btn = document.getElementById('registerBtn');
    clearAlerts();

    if (!nom || !prenom || !email || !password) {
      showError('Veuillez remplir tous les champs obligatoires (Nom, Prénom, Email, Mot de passe).');
      return;
    }
    if (!validatePassword(password)) {
      showError('Mot de passe trop faible. Respectez les critères de sécurité.');
      return;
    }

    btn.innerHTML = '<span class="spinner"></span> Création...';
    btn.disabled = true;

    try {
      const res = await fetch(`${API_URL}/auth/register`, {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({
          nom: `${prenom} ${nom}`,
          email,
          telephone: tel,
          adresse,
          password,
          role: 'client'
        })
      });
      const data = await res.json();
      if (!res.ok) {
        showError(data.message || 'Erreur lors de l’inscription.');
        return;
      }
      showSuccess('Compte créé avec succès ! Vous pouvez maintenant vous connecter.');
      setTimeout(() => switchTab('login'), 2500);
    } catch (err) {
      showError('Erreur serveur. Veuillez réessayer plus tard.');
    } finally {
      btn.innerHTML = 'Créer mon compte';
      btn.disabled = false;
    }
  }

  // Vérification force mot de passe
  function checkStrength(pw) {
    const rules = {
      len: pw.length >= 8,
      upper: /[A-Z]/.test(pw),
      lower: /[a-z]/.test(pw),
      num: /[0-9]/.test(pw),
      spec: /[^A-Za-z0-9]/.test(pw)
    };
    for (const [key, ok] of Object.entries(rules)) {
      const el = document.getElementById(`rule-${key}`);
      if (el) el.classList.toggle('ok', ok);
    }
    const rulesContainer = document.getElementById('pwRules');
    rulesContainer.style.display = pw ? 'block' : 'none';

    const score = Object.values(rules).filter(Boolean).length;
    const strengthMap = [
      { w: '0%', bg: '', txt: '' },
      { w: '20%', bg: '#E53E3E', txt: 'Très faible' },
      { w: '40%', bg: '#DD6B20', txt: 'Faible' },
      { w: '60%', bg: '#D69E2E', txt: 'Moyen' },
      { w: '80%', bg: '#38A169', txt: 'Fort' },
      { w: '100%', bg: 'var(--primary)', txt: 'Très fort ✓' }
    ][score];
    const fill = document.getElementById('strengthFill');
    fill.style.width = strengthMap.w;
    fill.style.background = strengthMap.bg;
    document.getElementById('strengthLabel').textContent = strengthMap.txt;
  }

  function validatePassword(pw) {
    return pw.length >= 8 && /[A-Z]/.test(pw) && /[a-z]/.test(pw) &&
           /[0-9]/.test(pw) && /[^A-Za-z0-9]/.test(pw);
  }

  // Soumission par touche Entrée
  document.addEventListener('keydown', (e) => {
    if (e.key !== 'Enter') return;
    const activePanel = document.querySelector('.tab-panel.active').id;
    if (activePanel === 'panel-login') handleLogin();
    if (activePanel === 'panel-register') handleRegister();
  });
</script>
<script src="js/chatbot.js"></script>
</body>
</html>
