<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>PeinturePro TN — Mot de passe oublié</title>
  <link rel="stylesheet" href="/css/main.css"/>
  <style>
    body {
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      background: var(--surface);
    }
    body::before {
      content: '';
      position: fixed; inset: 0;
      background: radial-gradient(ellipse 60% 50% at 50% 30%, rgba(200,68,26,.06) 0%, transparent 60%);
      pointer-events: none;
    }

    .card {
      width: 100%;
      max-width: 420px;
      background: var(--white);
      border-radius: var(--radius-lg);
      box-shadow: var(--shadow-lg);
      padding: 2.75rem;
      animation: slideUp .5s cubic-bezier(.16,1,.3,1) both;
      position: relative;
      z-index: 1;
    }

    .back-link {
      display: inline-flex;
      align-items: center;
      gap: .4rem;
      font-size: .83rem;
      color: var(--text-muted);
      text-decoration: none;
      margin-bottom: 1.75rem;
      transition: color .2s;
    }
    .back-link:hover { color: var(--primary); }

    .icon-wrap {
      width: 56px; height: 56px;
      background: var(--primary-light);
      border-radius: var(--radius-md);
      display: flex; align-items: center; justify-content: center;
      margin-bottom: 1.25rem;
    }

    h1 {
      font-family: var(--font-display);
      font-size: 1.7rem;
      color: var(--dark);
      margin-bottom: .4rem;
    }
    .subtitle {
      color: var(--text-muted);
      font-size: .9rem;
      margin-bottom: 1.75rem;
      line-height: 1.6;
    }

    .input-icon { position: relative; }
    .input-icon .icon {
      position: absolute; left: .95rem; top: 50%;
      transform: translateY(-50%);
      color: var(--text-muted); pointer-events: none;
    }
    .input-icon .form-control { padding-left: 2.6rem; }

    .btn-submit { width: 100%; padding: .9rem; font-size: 1rem; }

    /* Succès */
    .success-state { display: none; text-align: center; }
    .success-state.show { display: block; }
    .success-icon {
      width: 64px; height: 64px;
      background: #E6F6EE;
      border-radius: 50%;
      display: flex; align-items: center; justify-content: center;
      margin: 0 auto 1.25rem;
      font-size: 1.75rem;
    }
    .success-title {
      font-family: var(--font-display);
      font-size: 1.4rem;
      color: var(--dark);
      margin-bottom: .5rem;
    }
    .success-msg {
      color: var(--text-muted);
      font-size: .9rem;
      line-height: 1.7;
      margin-bottom: 1.5rem;
    }
    .success-msg strong { color: var(--primary); }
  </style>
</head>
<body>
  <div class="card">

    <!-- Formulaire -->
    <div id="formView">
      <a href="javascript:history.back()" class="back-link">
        <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5">
          <polyline points="15 18 9 12 15 6"/>
        </svg>
        Retour
      </a>

      <div class="icon-wrap">
        <svg width="26" height="26" viewBox="0 0 24 24" fill="none" stroke="var(--primary)" stroke-width="2">
          <rect x="3" y="11" width="18" height="11" rx="2"/>
          <path d="M7 11V7a5 5 0 0 1 10 0v4"/>
        </svg>
      </div>

      <h1>Mot de passe<br/>oublié ?</h1>
      <p class="subtitle">
        Entrez votre adresse e-mail et nous vous enverrons
        un lien pour réinitialiser votre mot de passe.
      </p>

      <div class="alert alert-error" id="alertError">
        ⚠️ <span id="alertMsg"></span>
      </div>

      <div class="form-group">
        <label>Adresse e-mail</label>
        <div class="input-icon">
          <svg class="icon" width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
            <path d="M4 4h16c1.1 0 2 .9 2 2v12c0 1.1-.9 2-2 2H4c-1.1 0-2-.9-2-2V6c0-1.1.9-2 2-2z"/>
            <polyline points="22,6 12,13 2,6"/>
          </svg>
          <input type="email" class="form-control" id="email"
                 placeholder="votre@email.tn" autocomplete="email"/>
        </div>
      </div>

      <button class="btn-primary btn-submit" id="submitBtn" onclick="handleSubmit()">
        Envoyer le lien
      </button>
    </div>

    <!-- Succès -->
    <div class="success-state" id="successView">
      <div class="success-icon">📧</div>
      <div class="success-title">E-mail envoyé !</div>
      <p class="success-msg">
        Un lien de réinitialisation a été envoyé à<br/>
        <strong id="emailSent"></strong><br/><br/>
        Le lien expire dans <strong>1 heure</strong>.<br/>
        Vérifiez aussi vos spams.
      </p>
      <button class="btn-outline w-100"
              onclick="window.location.href='/login-client.html'">
        Retour à la connexion
      </button>
    </div>

  </div>

  <script>
    const API_URL = 'http://localhost:3001/api';

    async function handleSubmit() {
      const email = document.getElementById('email').value.trim();
      const btn   = document.getElementById('submitBtn');
      document.getElementById('alertError').classList.remove('show');

      if (!email) { showError('Veuillez saisir votre adresse e-mail.'); return; }
      if (!/^[^\s@]+@[^\s@]+\.[^\s@]+$/.test(email)) {
        showError('Adresse e-mail invalide.'); return;
      }

      btn.innerHTML = '<span class="spinner"></span>Envoi…';
      btn.disabled  = true;

      try {
        await fetch(`${API_URL}/auth/forgot-password`, {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ email })
        });
        // Toujours afficher succès (sécurité)
        document.getElementById('emailSent').textContent    = email;
        document.getElementById('formView').style.display   = 'none';
        document.getElementById('successView').classList.add('show');
      } catch {
        showError('Erreur serveur. Veuillez réessayer.');
        btn.innerHTML = 'Envoyer le lien';
        btn.disabled  = false;
      }
    }

    function showError(msg) {
      document.getElementById('alertMsg').textContent = msg;
      document.getElementById('alertError').classList.add('show');
    }

    document.addEventListener('keydown', e => {
      if (e.key === 'Enter') handleSubmit();
    });
  </script>
</body>
</html>
