<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>PeinturePro TN — Donner mon avis</title>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&family=Poppins:wght@400;500;600;700;800&display=swap" rel="stylesheet">
  <link href="https://fonts.googleapis.com/icon?family=Material+Icons" rel="stylesheet">
  <style>
    /* ===== THÈME CLIENT (identique aux autres pages) ===== */
    :root {
      --bg-dark: #0a0a1a;
      --bg-surface: #0f0f1f;
      --primary: #6366f1;
      --primary-dark: #4f46e5;
      --primary-light: #818cf8;
      --accent: #f59e0b;
      --accent-glow: #fbbf24;
      --success: #10b981;
      --text-white: #ffffff;
      --text-gray: #a1a1aa;
      --card-bg: rgba(255, 255, 255, 0.03);
      --border-glow: rgba(99, 102, 241, 0.3);
      --gradient-hero: linear-gradient(135deg, #6366f1 0%, #a855f7 50%, #ec4899 100%);
      --shadow-glow: 0 0 30px rgba(99, 102, 241, 0.3);
      --radius-lg: 24px;
      --radius-md: 16px;
      --radius-sm: 12px;
      --font-display: 'Poppins', system-ui, sans-serif;
      --font-body: 'Inter', system-ui, sans-serif;
    }

    * { margin: 0; padding: 0; box-sizing: border-box; }

    body {
      background: var(--bg-dark);
      font-family: var(--font-body);
      color: var(--text-white);
      min-height: 100vh;
      display: flex;
      overflow-x: hidden;
    }

    /* ===== SIDEBAR ===== */
    .sidebar {
      width: 260px;
      min-height: 100vh;
      background: rgba(15, 15, 31, 0.95);
      backdrop-filter: blur(12px);
      border-right: 1px solid rgba(99, 102, 241, 0.3);
      display: flex;
      flex-direction: column;
      position: fixed;
      top: 0;
      left: 0;
      z-index: 100;
    }
    .sidebar-brand { padding: 1.5rem; border-bottom: 1px solid rgba(99,102,241,0.3); margin-bottom: 1rem; }
    .logo-image { height: 40px; width: auto; filter: drop-shadow(0 0 8px rgba(99,102,241,0.5)); }
    .sidebar-menu { flex: 1; padding: 0 1rem; }
    .menu-label { font-size: 0.7rem; font-weight: 600; letter-spacing: 0.1em; text-transform: uppercase; color: var(--text-gray); padding: 0.75rem 0.75rem 0.35rem; }
    .menu-item {
      display: flex; align-items: center; gap: 0.75rem; padding: 0.65rem 0.75rem; border-radius: var(--radius-sm);
      text-decoration: none; color: var(--text-gray); font-size: 0.85rem; font-weight: 500; transition: all 0.2s;
      margin-bottom: 0.15rem; cursor: pointer; border: none; background: none; width: 100%; text-align: left;
    }
    .menu-item .material-icons { font-size: 20px; }
    .menu-item:hover, .menu-item.active { background: rgba(99,102,241,0.2); color: var(--primary-light); }
    .sidebar-footer { padding: 1rem; border-top: 1px solid rgba(99,102,241,0.3); margin-top: auto; }
    .user-info { display: flex; align-items: center; gap: 0.75rem; padding: 0.65rem 0.75rem; margin-bottom: 0.5rem; }
    .user-avatar { width: 38px; height: 38px; background: linear-gradient(135deg, var(--primary), var(--primary-dark)); border-radius: 50%; display: flex; align-items: center; justify-content: center; font-weight: 600; color: white; }
    .user-name { font-size: 0.85rem; font-weight: 600; color: var(--text-white); }
    .user-role { font-size: 0.7rem; color: var(--text-gray); }

    /* ===== MAIN ===== */
    .main { margin-left: 260px; flex: 1; min-height: 100vh; background: var(--bg-dark); }
    .topbar {
      background: rgba(15,15,31,0.8); backdrop-filter: blur(12px); border-bottom: 1px solid rgba(99,102,241,0.3);
      padding: 1rem 2rem; display: flex; align-items: center; justify-content: space-between; position: sticky; top: 0; z-index: 90;
    }
    .topbar-title { font-family: var(--font-display); font-size: 1.3rem; background: linear-gradient(135deg, var(--text-white), var(--primary-light)); -webkit-background-clip: text; background-clip: text; color: transparent; }
    .content { padding: 2rem; max-width: 1200px; margin: 0 auto; }

    /* ===== CARTES FORMULAIRE ===== */
    .card {
      background: var(--card-bg); backdrop-filter: blur(10px); border: 1px solid rgba(99,102,241,0.3);
      border-radius: var(--radius-md); padding: 2rem; transition: all 0.3s ease; margin-bottom: 2rem;
    }
    .card:hover { border-color: var(--primary); box-shadow: var(--shadow-glow); }
    .card-title { font-family: var(--font-display); font-size: 1.2rem; color: var(--primary-light); margin-bottom: 1.5rem; border-bottom: 1px solid rgba(99,102,241,0.3); padding-bottom: 0.75rem; display: flex; align-items: center; gap: 0.5rem; }

    .form-group { margin-bottom: 1.5rem; }
    .form-group label { display: block; font-size: 0.85rem; font-weight: 500; margin-bottom: 0.5rem; color: var(--text-gray); }
    .form-control {
      width: 100%; background: rgba(255,255,255,0.05); border: 1.5px solid rgba(99,102,241,0.3); border-radius: var(--radius-sm);
      padding: 0.85rem 1rem; font-family: var(--font-body); font-size: 0.9rem; color: var(--text-white); transition: all 0.3s;
    }
    .form-control:focus { outline: none; border-color: var(--primary); background: rgba(255,255,255,0.08); }
    .form-control:disabled { opacity: 0.7; cursor: not-allowed; }

    .rating-input { display: flex; gap: 0.5rem; cursor: pointer; font-size: 2rem; color: var(--text-gray); }
    .star-rating { transition: color 0.2s; cursor: pointer; }
    .star-rating.active, .star-rating:hover { color: var(--accent); text-shadow: 0 0 5px var(--accent-glow); }

    .btn-submit {
      background: linear-gradient(135deg, var(--primary), var(--primary-dark)); border: none; border-radius: var(--radius-sm);
      padding: 0.9rem 1.5rem; font-size: 1rem; font-weight: 600; color: white; cursor: pointer; transition: all 0.3s; width: 100%;
    }
    .btn-submit:hover { transform: translateY(-2px); box-shadow: 0 8px 20px rgba(99,102,241,0.5); }

    .form-message { margin-top: 1rem; font-size: 0.9rem; text-align: center; color: var(--success); }
    .form-message.error { color: #fca5a5; }

    /* ===== LISTE DES AVIS ===== */
    .reviews-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(300px, 1fr)); gap: 1.5rem; margin-top: 1rem; }
    .review-card { background: var(--card-bg); border: 1px solid rgba(99,102,241,0.2); border-radius: var(--radius-md); padding: 1.5rem; transition: all 0.3s; }
    .review-card:hover { transform: translateY(-4px); border-color: var(--primary); }
    .review-stars { display: flex; gap: 0.2rem; margin-bottom: 1rem; color: var(--accent); }
    .review-stars .material-icons { font-size: 18px; }
    .review-text { color: var(--text-gray); font-size: 0.9rem; line-height: 1.6; margin-bottom: 1rem; font-style: italic; }
    .review-author { display: flex; align-items: center; gap: 0.75rem; border-top: 1px solid rgba(99,102,241,0.2); padding-top: 1rem; }
    .review-avatar { width: 40px; height: 40px; background: linear-gradient(135deg, var(--primary), var(--primary-dark)); border-radius: 50%; display: flex; align-items: center; justify-content: center; }
    .review-avatar .material-icons { font-size: 20px; color: white; }
    .review-name { font-weight: 600; color: var(--text-white); font-size: 0.9rem; }
    .review-role { font-size: 0.7rem; color: var(--text-gray); }
    .loading, .empty { text-align: center; color: var(--text-gray); padding: 2rem; }

    @media (max-width: 768px) {
      .sidebar { display: none; }
      .main { margin-left: 0; }
      .content { padding: 1rem; }
      .topbar { padding: 1rem; }
    }
  </style>
<link rel="icon" href="data:,">
</head>
<body>

<aside class="sidebar">
  <div class="sidebar-brand">
    <img src="../images/logo.png" alt="PeinturePro TN" class="logo-image">
  </div>
  <nav class="sidebar-menu">
    <div class="menu-label">Client</div>
    <a class="menu-item" href="/client/catalogue.html"><span class="material-icons">palette</span>Catalogue</a>
    <a class="menu-item" href="/client/simulateur.html"><span class="material-icons">calculate</span>Simulateur</a>
    <a class="menu-item" href="/client/commande.html"><span class="material-icons">shopping_cart</span>Commander</a>
    <a class="menu-item" href="/client/mes-commandes.html"><span class="material-icons">receipt</span>Mes commandes</a>
    <a class="menu-item active" href="/client/avis.html"><span class="material-icons">star</span>Donner mon avis</a>
  </nav>
  <div class="sidebar-footer">
    <div class="user-info">
      <div class="user-avatar" id="userAvatar">C</div>
      <div><div class="user-name" id="userName">Client</div><div class="user-role">Client</div></div>
    </div>
    <button class="menu-item" onclick="logout()"><span class="material-icons">logout</span>Déconnexion</button>
  </div>
</aside>

<div class="main">
  <div class="topbar">
    <div class="topbar-title">📝 Donner mon avis</div>
  </div>
  <div class="content">
    <!-- Formulaire avis -->
    <div class="card">
      <div class="card-title"><span class="material-icons">edit_note</span>Partagez votre expérience</div>
      <form id="avisForm">
        <div class="form-group">
          <label>Votre nom</label>
          <input type="text" id="clientNom" class="form-control" disabled>
        </div>
        <div class="form-group">
          <label>Note</label>
          <div class="rating-input" id="ratingInput">
            <span class="star-rating" data-value="1">☆</span>
            <span class="star-rating" data-value="2">☆</span>
            <span class="star-rating" data-value="3">☆</span>
            <span class="star-rating" data-value="4">☆</span>
            <span class="star-rating" data-value="5">☆</span>
          </div>
          <input type="hidden" id="avisNote" value="0">
        </div>
        <div class="form-group">
          <label>Votre avis</label>
          <textarea id="avisMessage" rows="4" class="form-control" placeholder="Décrivez votre expérience avec nos produits et services..." required></textarea>
        </div>
        <button type="submit" class="btn-submit">Envoyer mon avis</button>
        <div id="formMessage" class="form-message"></div>
      </form>
    </div>

    <!-- Liste des avis clients -->
    <div class="card">
      <div class="card-title"><span class="material-icons">chat</span>Ce que nos clients pensent</div>
      <div id="reviewsList">
        <div class="loading">Chargement des avis...</div>
      </div>
    </div>
  </div>
</div>

<script src="/js/api.js"></script>
<script src="/js/auth.js"></script>
<script>
  // Protection : seule un client connecté peut voir cette page
  requireAuth(['client']);

  const user = Auth.getUser();
  if (user) {
    document.getElementById('userName').textContent = user.nom;
    document.getElementById('userAvatar').textContent = user.nom.charAt(0).toUpperCase();
    document.getElementById('clientNom').value = user.nom;
  } else {
    // Redirection si pas connecté (normalement requireAuth le fait déjà)
    window.location.href = '/login-client.html';
  }

  // ===== GESTION DES ÉTOILES =====
  function initStars() {
    const stars = document.querySelectorAll('.star-rating');
    const ratingInput = document.getElementById('avisNote');
    stars.forEach(star => {
      star.addEventListener('click', function() {
        const value = parseInt(this.getAttribute('data-value'));
        ratingInput.value = value;
        stars.forEach(s => {
          const val = parseInt(s.getAttribute('data-value'));
          if (val <= value) {
            s.textContent = '★';
            s.classList.add('active');
          } else {
            s.textContent = '☆';
            s.classList.remove('active');
          }
        });
      });
    });
  }

  // ===== CHARGER LES AVIS =====
  async function loadReviews() {
    const container = document.getElementById('reviewsList');
    try {
      const res = await api.get('/avis');
      if (!res.ok) throw new Error();
      const avis = await res.json();
      if (avis.length === 0) {
        container.innerHTML = '<div class="empty">Aucun avis pour le moment. Soyez le premier !</div>';
        return;
      }
      container.innerHTML = `
        <div class="reviews-grid">
          ${avis.map(rev => `
            <div class="review-card">
              <div class="review-stars">${generateStars(rev.note)}</div>
              <div class="review-text">"${escapeHtml(rev.message)}"</div>
              <div class="review-author">
                <div class="review-avatar"><span class="material-icons">person</span></div>
                <div>
                  <div class="review-name">${escapeHtml(rev.client_nom)}</div>
                  <div class="review-role">Client</div>
                </div>
              </div>
            </div>
          `).join('')}
        </div>
      `;
    } catch (err) {
      console.error(err);
      container.innerHTML = '<div class="empty">Erreur de chargement des avis.</div>';
    }
  }

  function generateStars(note) {
    let stars = '';
    const full = Math.floor(note);
    const half = note % 1 >= 0.5;
    for (let i = 1; i <= 5; i++) {
      if (i <= full) stars += '<span class="material-icons">star</span>';
      else if (i === full+1 && half) stars += '<span class="material-icons">star_half</span>';
      else stars += '<span class="material-icons">star_border</span>';
    }
    return stars;
  }

  function escapeHtml(str) {
    if (!str) return '';
    return str.replace(/[&<>]/g, m => m === '&' ? '&amp;' : m === '<' ? '&lt;' : '&gt;');
  }

  // ===== SOUMISSION FORMULAIRE =====
  const form = document.getElementById('avisForm');
  form.addEventListener('submit', async (e) => {
    e.preventDefault();
    const message = document.getElementById('avisMessage').value.trim();
    const note = parseInt(document.getElementById('avisNote').value);
    const msgDiv = document.getElementById('formMessage');

    if (!message || note === 0) {
      msgDiv.textContent = 'Veuillez écrire votre avis et attribuer une note (1 à 5 étoiles).';
      msgDiv.className = 'form-message error';
      return;
    }

    try {
      const res = await api.post('/avis', { message, note });
      if (res.ok) {
        msgDiv.textContent = '✅ Merci ! Votre avis a été ajouté.';
        msgDiv.className = 'form-message';
        document.getElementById('avisMessage').value = '';
        document.getElementById('avisNote').value = 0;
        // Réinitialiser les étoiles
        const stars = document.querySelectorAll('.star-rating');
        stars.forEach(s => { s.textContent = '☆'; s.classList.remove('active'); });
        // Recharger la liste des avis
        loadReviews();
        setTimeout(() => msgDiv.textContent = '', 3000);
      } else {
        const err = await res.json();
        msgDiv.textContent = err.message || 'Erreur lors de l\'envoi.';
        msgDiv.className = 'form-message error';
      }
    } catch (err) {
      console.error(err);
      msgDiv.textContent = 'Erreur réseau. Réessayez plus tard.';
      msgDiv.className = 'form-message error';
    }
  });

  // ===== DÉCONNEXION =====
  function logout() {
    localStorage.removeItem('token');
    localStorage.removeItem('refreshToken');
    localStorage.removeItem('user');
    localStorage.removeItem('role');
    window.location.href = '/login-client.html';
  }

  // Initialisation
  initStars();
  loadReviews();
</script>
<script src="../js/chatbot.js"></script>
</body>
</html>
