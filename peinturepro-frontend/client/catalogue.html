<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>PeinturePro TN — Catalogue</title>
  <!-- Google Fonts + Material Icons -->
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&family=Poppins:wght@400;500;600;700;800&display=swap" rel="stylesheet">
  <link href="https://fonts.googleapis.com/icon?family=Material+Icons" rel="stylesheet">
  <style>
    /* ===== THÈME MODERNE ===== */
    :root {
      --bg-dark: #0a0a1a;
      --bg-surface: #0f0f1f;
      --primary: #6366f1;
      --primary-dark: #4f46e5;
      --primary-light: #818cf8;
      --accent: #f59e0b;
      --accent-glow: #fbbf24;
      --success: #10b981;
      --text-white: #ffffff;
      --text-gray: #a1a1aa;
      --card-bg: rgba(255, 255, 255, 0.03);
      --border-glow: rgba(99, 102, 241, 0.3);
      --gradient-hero: linear-gradient(135deg, #6366f1 0%, #a855f7 50%, #ec4899 100%);
      --shadow-glow: 0 0 30px rgba(99, 102, 241, 0.3);
      --radius-lg: 24px;
      --radius-md: 16px;
      --radius-sm: 12px;
      --font-display: 'Poppins', system-ui, -apple-system, sans-serif;
      --font-body: 'Inter', system-ui, -apple-system, sans-serif;
    }

    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    body {
      min-height: 100vh;
      background: var(--bg-dark);
      font-family: var(--font-body);
      color: var(--text-white);
      overflow-x: hidden;
    }

    /* Décors de fond */
    .deco-bg {
      position: fixed;
      inset: 0;
      pointer-events: none;
      z-index: 0;
    }
    .deco-bg svg {
      width: 100%;
      height: 100%;
      animation: rotateSlow 30s linear infinite;
    }
    @keyframes rotateSlow {
      from { transform: rotate(0deg); }
      to { transform: rotate(360deg); }
    }

    /* ===== NAVBAR ===== */
    .navbar {
      background: rgba(10, 10, 26, 0.8);
      backdrop-filter: blur(12px);
      padding: 0.8rem 3rem;
      display: flex;
      align-items: center;
      justify-content: space-between;
      position: sticky;
      top: 0;
      z-index: 100;
      border-bottom: 1px solid rgba(99, 102, 241, 0.2);
    }
    .nav-brand {
      display: flex;
      align-items: center;
      gap: 0.75rem;
    }
    .logo-image {
      height: 45px;
      width: auto;
      filter: drop-shadow(0 0 10px rgba(99, 102, 241, 0.5));
      transition: all 0.3s ease;
    }
    .logo-image:hover {
      filter: drop-shadow(0 0 20px var(--primary));
      transform: scale(1.05);
    }
    .brand-text {
      font-family: var(--font-display);
      font-size: 1.2rem;
      font-weight: 600;
      background: linear-gradient(135deg, var(--text-white), var(--primary-light));
      -webkit-background-clip: text;
      background-clip: text;
      color: transparent;
    }
    .brand-text span {
      background: linear-gradient(135deg, var(--accent), var(--accent-glow));
      -webkit-background-clip: text;
      background-clip: text;
      color: transparent;
    }
    .nav-right {
      display: flex;
      align-items: center;
      gap: 1.5rem;
    }
    .nav-user {
      font-size: 0.9rem;
      color: var(--text-gray);
    }
    .nav-user strong {
      color: var(--primary-light);
    }
    .btn-cart {
      background: linear-gradient(135deg, var(--primary), var(--primary-dark));
      border: none;
      border-radius: var(--radius-sm);
      padding: 0.5rem 1rem;
      font-size: 0.85rem;
      font-weight: 600;
      color: white;
      cursor: pointer;
      text-decoration: none;
      display: flex;
      align-items: center;
      gap: 0.4rem;
      transition: all 0.3s ease;
    }
    .btn-cart:hover {
      transform: translateY(-2px);
      box-shadow: 0 5px 15px rgba(99, 102, 241, 0.4);
    }
    .cart-count {
      background: var(--accent);
      color: var(--bg-dark);
      border-radius: 50%;
      width: 20px;
      height: 20px;
      font-size: 0.7rem;
      font-weight: 700;
      display: inline-flex;
      align-items: center;
      justify-content: center;
    }
    .btn-logout {
      background: transparent;
      border: 1.5px solid rgba(99, 102, 241, 0.5);
      border-radius: var(--radius-sm);
      padding: 0.45rem 1rem;
      font-size: 0.85rem;
      color: var(--text-gray);
      cursor: pointer;
      transition: all 0.3s ease;
    }
    .btn-logout:hover {
      border-color: var(--primary);
      color: var(--primary-light);
      transform: translateY(-2px);
    }

    /* ===== HERO ===== */
    .hero {
      background: var(--bg-dark);
      padding: 3rem 2rem;
      text-align: center;
      position: relative;
      border-bottom: 1px solid rgba(99, 102, 241, 0.2);
    }
    .hero::before {
      content: '';
      position: absolute;
      inset: 0;
      background: radial-gradient(ellipse 70% 60% at 50% 50%, rgba(99, 102, 241, 0.15) 0%, transparent 70%);
    }
    .hero-content {
      position: relative;
      z-index: 1;
    }
    .hero h1 {
      font-family: var(--font-display);
      font-size: clamp(1.8rem, 4vw, 2.5rem);
      background: var(--gradient-hero);
      -webkit-background-clip: text;
      background-clip: text;
      color: transparent;
      margin-bottom: 0.5rem;
    }
    .hero h1 span {
      background: linear-gradient(135deg, var(--accent), var(--accent-glow));
      -webkit-background-clip: text;
      background-clip: text;
      color: transparent;
    }
    .hero p {
      color: var(--text-gray);
      font-size: 0.95rem;
    }

    /* ===== FILTRES ===== */
    .filters-bar {
      background: rgba(15, 15, 31, 0.8);
      backdrop-filter: blur(8px);
      border-bottom: 1px solid rgba(99, 102, 241, 0.2);
      padding: 1rem 2rem;
      display: flex;
      align-items: center;
      gap: 1rem;
      flex-wrap: wrap;
      position: sticky;
      top: 72px;
      z-index: 90;
    }
    .filter-label {
      font-size: 0.75rem;
      font-weight: 600;
      color: var(--text-gray);
      text-transform: uppercase;
      letter-spacing: 0.08em;
    }
    .filter-btn {
      background: transparent;
      border: 1.5px solid rgba(99, 102, 241, 0.3);
      border-radius: 40px;
      padding: 0.4rem 1rem;
      font-size: 0.8rem;
      color: var(--text-gray);
      cursor: pointer;
      transition: all 0.2s;
    }
    .filter-btn:hover, .filter-btn.active {
      border-color: var(--primary);
      background: rgba(99, 102, 241, 0.2);
      color: var(--primary-light);
    }
    .search-input {
      background: rgba(255, 255, 255, 0.05);
      border: 1.5px solid rgba(99, 102, 241, 0.3);
      border-radius: 40px;
      padding: 0.45rem 1rem;
      font-size: 0.85rem;
      color: var(--text-white);
      outline: none;
      width: 220px;
      margin-left: auto;
    }
    .search-input:focus {
      border-color: var(--primary);
      box-shadow: 0 0 0 2px rgba(99, 102, 241, 0.2);
    }
    .search-input::placeholder {
      color: rgba(161, 161, 170, 0.6);
    }

    /* ===== CATALOGUE ===== */
    .catalogue-section {
      max-width: 1400px;
      margin: 0 auto;
      padding: 2rem;
    }
    .section-title {
      font-family: var(--font-display);
      font-size: 1.4rem;
      background: linear-gradient(135deg, var(--text-white), var(--primary-light));
      -webkit-background-clip: text;
      background-clip: text;
      color: transparent;
      margin-bottom: 1.5rem;
    }
    .section-title span {
      font-size: 0.85rem;
      font-weight: 400;
      color: var(--text-gray);
      font-family: var(--font-body);
      margin-left: 0.5rem;
    }
    .products-grid {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(280px, 1fr));
      gap: 1.8rem;
    }

    /* ===== CARTE PRODUIT ===== */
    .product-card {
      background: var(--card-bg);
      backdrop-filter: blur(10px);
      border: 1px solid rgba(99, 102, 241, 0.2);
      border-radius: var(--radius-md);
      overflow: hidden;
      transition: all 0.3s ease;
      cursor: pointer;
    }
    .product-card:hover {
      transform: translateY(-6px);
      border-color: var(--primary);
      box-shadow: var(--shadow-glow);
    }
    .color-preview {
      height: 150px;
      position: relative;
      display: flex;
      align-items: flex-end;
      justify-content: space-between;
      padding: 0.75rem;
    }
    .color-hex {
      background: rgba(0,0,0,0.5);
      backdrop-filter: blur(4px);
      color: white;
      font-size: 0.7rem;
      font-family: monospace;
      padding: 0.2rem 0.5rem;
      border-radius: 6px;
    }
    .stock-badge {
      font-size: 0.7rem;
      font-weight: 600;
      padding: 0.2rem 0.6rem;
      border-radius: 40px;
      backdrop-filter: blur(4px);
    }
    .stock-ok {
      background: rgba(16, 185, 129, 0.2);
      color: #6ee7b7;
      border: 1px solid rgba(16, 185, 129, 0.4);
    }
    .stock-low {
      background: rgba(239, 68, 68, 0.2);
      color: #fca5a5;
      border: 1px solid rgba(239, 68, 68, 0.4);
    }
    .card-body {
      padding: 1.2rem;
    }
    .card-type {
      font-size: 0.7rem;
      font-weight: 600;
      text-transform: uppercase;
      letter-spacing: 0.08em;
      color: var(--primary-light);
      margin-bottom: 0.4rem;
    }
    .card-name {
      font-family: var(--font-display);
      font-size: 1.1rem;
      color: var(--text-white);
      margin-bottom: 0.5rem;
    }
    .card-meta {
      display: flex;
      gap: 0.5rem;
      margin-bottom: 0.8rem;
      flex-wrap: wrap;
    }
    .meta-tag {
      background: rgba(255, 255, 255, 0.05);
      border: 1px solid rgba(255, 255, 255, 0.1);
      border-radius: 6px;
      font-size: 0.7rem;
      color: var(--text-gray);
      padding: 0.2rem 0.6rem;
      display: inline-flex;
      align-items: center;
      gap: 4px;
    }
    .meta-tag .material-icons {
      font-size: 14px;
    }
    .card-footer {
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding-top: 0.8rem;
      border-top: 1px solid rgba(99, 102, 241, 0.2);
    }
    .card-price {
      font-family: var(--font-display);
      font-size: 1.2rem;
      color: var(--accent);
    }
    .card-price small {
      font-size: 0.7rem;
      color: var(--text-gray);
    }
    .btn-add {
      background: linear-gradient(135deg, var(--primary), var(--primary-dark));
      border: none;
      border-radius: var(--radius-sm);
      padding: 0.45rem 1rem;
      font-size: 0.8rem;
      font-weight: 600;
      color: white;
      cursor: pointer;
      transition: all 0.3s ease;
    }
    .btn-add:hover {
      transform: translateY(-2px);
      box-shadow: 0 4px 12px rgba(99, 102, 241, 0.4);
    }

    /* ===== LOADING & EMPTY ===== */
    .loading {
      text-align: center;
      padding: 4rem;
      color: var(--text-gray);
    }
    .loading .spinner {
      width: 40px;
      height: 40px;
      border: 3px solid rgba(99, 102, 241, 0.3);
      border-top-color: var(--primary);
      border-radius: 50%;
      animation: spin 0.8s linear infinite;
      margin: 0 auto 1rem;
    }
    @keyframes spin { to { transform: rotate(360deg); } }
    .empty-state {
      text-align: center;
      padding: 4rem;
      color: var(--text-gray);
      display: none;
    }
    .empty-state .material-icons {
      font-size: 48px;
      margin-bottom: 1rem;
      opacity: 0.5;
    }

    /* ===== TOAST ===== */
    .toast {
      position: fixed;
      bottom: 2rem;
      right: 2rem;
      background: var(--bg-surface);
      border: 1px solid var(--primary);
      color: var(--text-white);
      padding: 0.75rem 1.25rem;
      border-radius: var(--radius-sm);
      font-size: 0.85rem;
      z-index: 1000;
      animation: slideUp 0.3s ease;
      box-shadow: var(--shadow-glow);
    }
    @keyframes slideUp {
      from { opacity: 0; transform: translateY(20px); }
      to { opacity: 1; transform: translateY(0); }
    }

    /* Responsive */
    @media (max-width: 768px) {
      .navbar { padding: 0.8rem 1.5rem; }
      .filters-bar { padding: 0.8rem 1rem; top: 60px; }
      .search-input { width: 100%; margin-left: 0; }
      .catalogue-section { padding: 1rem; }
    }
  </style>
</head>
<body>

<!-- Décors de fond -->
<div class="deco-bg">
  <svg viewBox="0 0 1200 800" preserveAspectRatio="xMidYMid slice">
    <circle cx="200" cy="200" r="400" fill="none" stroke="rgba(255,255,255,.02)" stroke-width="1"/>
    <circle cx="1000" cy="600" r="350" fill="none" stroke="rgba(255,255,255,.02)" stroke-width="1"/>
    <circle cx="600" cy="400" r="550" fill="none" stroke="rgba(255,255,255,.01)" stroke-width="1"/>
    <ellipse cx="150" cy="650" rx="200" ry="80" fill="rgba(99,102,241,.05)" transform="rotate(-15,150,650)"/>
    <ellipse cx="1050" cy="150" rx="180" ry="70" fill="rgba(168,85,247,.05)" transform="rotate(20,1050,150)"/>
  </svg>
</div>

<!-- Navbar -->
<nav class="navbar">
  <div class="nav-brand">
    <img src="../images/logo.png" alt="PeinturePro TN" class="logo-image">
   
  </div>
  <div class="nav-right">
    <span class="nav-user">Bonjour, <strong id="userName">...</strong></span>
    <a href="commande.html" class="btn-cart">
      <span class="material-icons" style="font-size: 18px;">shopping_cart</span>
      Panier
      <span class="cart-count" id="cartCount">0</span>
    </a>
    <button class="btn-logout" onclick="logout()">Déconnexion</button>
  </div>
</nav>

<!-- Hero -->
<div class="hero">
  <div class="hero-content">
    <h1>Notre <span>Catalogue</span></h1>
    <p>Peintures intérieures, extérieures et imperméabilisantes — qualité tunisienne</p>
  </div>
</div>

<!-- Filtres -->
<div class="filters-bar">
  <span class="filter-label">Filtrer :</span>
  <button class="filter-btn active" onclick="filterBy('tous', this)">Tous</button>
  <button class="filter-btn" onclick="filterBy('interieure', this)">Intérieure</button>
  <button class="filter-btn" onclick="filterBy('exterieure', this)">Extérieure</button>
  <button class="filter-btn" onclick="filterBy('impermeabilisante', this)">Imperméabilisante</button>
  <input type="text" class="search-input" placeholder="🔍 Rechercher une peinture..." oninput="searchProducts(this.value)">
</div>

<!-- Catalogue -->
<section class="catalogue-section">
  <h2 class="section-title">
    Nos peintures
    <span id="productCount"></span>
  </h2>
  <div id="loadingState" class="loading">
    <div class="spinner"></div>
    Chargement du catalogue...
  </div>
  <div class="products-grid" id="productsGrid"></div>
  <div class="empty-state" id="emptyState">
    <span class="material-icons">inventory_2</span>
    <p>Aucun produit trouvé.</p>
  </div>
</section>

<script src="../js/api.js"></script>
<script src="../js/auth.js"></script>
<script>
  requireAuth(['client']);
  displayUserInfo('#userName');

  let allProducts = [];
  let currentFilter = 'tous';
  let searchTerm = '';
  let cart = JSON.parse(localStorage.getItem('cart') || '[]');

  async function loadProducts() {
    try {
      const res = await api.get('/produits');
      const data = await res.json();
      allProducts = data;
      renderProducts(data);
      document.getElementById('loadingState').style.display = 'none';
    } catch (err) {
      document.getElementById('loadingState').innerHTML = '❌ Erreur de chargement.';
    }
  }

  function renderProducts(products) {
    const grid = document.getElementById('productsGrid');
    const empty = document.getElementById('emptyState');
    const count = document.getElementById('productCount');
    count.textContent = `(${products.length} produit${products.length > 1 ? 's' : ''})`;
    if (!products.length) {
      grid.innerHTML = '';
      empty.style.display = 'block';
      return;
    }
    empty.style.display = 'none';
    grid.innerHTML = products.map(p => {
      const stockOk = parseFloat(p.stock_litres) > parseFloat(p.stock_minimum);
      const typeLabel = { interieure: 'Intérieure', exterieure: 'Extérieure', impermeabilisante: 'Imperméabilisante' };
      return `
        <div class="product-card" onclick="openModal(${p.id})">
          <div class="color-preview" style="background:${p.couleur_code || '#CCC'}">
            <span class="color-hex">${p.couleur_code || 'N/A'}</span>
            <span class="stock-badge ${stockOk ? 'stock-ok' : 'stock-low'}">
              ${stockOk ? '✓ En stock' : '⚠ Stock bas'}
            </span>
          </div>
          <div class="card-body">
            <div class="card-type">${typeLabel[p.type] || p.type}</div>
            <div class="card-name">${p.nom}</div>
            <div class="card-meta">
              <span class="meta-tag"><span class="material-icons">palette</span> ${p.finition || 'N/A'}</span>
              <span class="meta-tag"><span class="material-icons">straighten</span> ${p.rendement_m2_L} m²/L</span>
              <span class="meta-tag"><span class="material-icons">inventory_2</span> ${p.stock_litres} L</span>
            </div>
            <div class="card-footer">
              <div class="card-price">${parseFloat(p.prix_litre).toFixed(3)}<small> DT/L</small></div>
              <button class="btn-add" onclick="event.stopPropagation(); openModal(${p.id})">+ Simuler</button>
            </div>
          </div>
        </div>
      `;
    }).join('');
  }

  function filterBy(type, btn) {
    currentFilter = type;
    document.querySelectorAll('.filter-btn').forEach(b => b.classList.remove('active'));
    btn.classList.add('active');
    applyFilters();
  }

  function searchProducts(term) {
    searchTerm = term.toLowerCase();
    applyFilters();
  }

  function applyFilters() {
    let filtered = allProducts;
    if (currentFilter !== 'tous') {
      filtered = filtered.filter(p => p.type === currentFilter);
    }
    if (searchTerm) {
      filtered = filtered.filter(p => p.nom.toLowerCase().includes(searchTerm) || p.type.toLowerCase().includes(searchTerm));
    }
    renderProducts(filtered);
  }

  // Redirection vers la page simulateur avec stockage du produit
  function openModal(productId) {
    const product = allProducts.find(p => p.id === productId);
    if (!product) return;
    localStorage.setItem('selectedProduct', JSON.stringify(product));
    window.location.href = 'simulateur.html';
  }

  function updateCartCount() {
    document.getElementById('cartCount').textContent = cart.length;
  }

  function showToast(msg) {
    const toast = document.createElement('div');
    toast.className = 'toast';
    toast.innerHTML = msg;
    document.body.appendChild(toast);
    setTimeout(() => toast.remove(), 3000);
  }

  function logout() {
    localStorage.removeItem('token');
    localStorage.removeItem('refreshToken');
    localStorage.removeItem('user');
    window.location.href = '/login-client.html';
  }

  updateCartCount();
  loadProducts();
</script>
</body>
</html>
