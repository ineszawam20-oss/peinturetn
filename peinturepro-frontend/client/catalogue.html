    :root {

      --bg-surface: #0f0f1f;
      --primary: #6366f1;
      --primary-dark: #4f46e5;
      --primary-light: #818cf8;
      --accent: #f59e0b;
      --accent-glow: #fbbf24;

      --prestige-gold-light: #e4c36a;
      --text-white: #ffffff;
      --text-gray: #a1a1aa;
      --card-bg: rgba(255, 255, 255, 0.03);

      --radius-lg: 24px;
      --radius-md: 16px;
      --radius-sm: 12px;
      --font-display: 'Poppins', system-ui, sans-serif;
      --font-body: 'Inter', system-ui, sans-serif;
    }
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body { min-height: 100vh; background: var(--bg-dark); font-family: var(--font-body); color: var(--text-white); overflow-x: hidden; }

    .deco-bg { position: fixed; inset: 0; pointer-events: none; z-index: 0; }

    .navbar {

    .brand-text { font-family: var(--font-display); font-size: 1.2rem; font-weight: 600; background: linear-gradient(135deg, var(--text-white), var(--primary-light)); -webkit-background-clip: text; background-clip: text; color: transparent; }
    .brand-text span { background: linear-gradient(135deg, var(--accent), var(--accent-glow)); -webkit-background-clip: text; background-clip: text; color: transparent; }
    .nav-right { display: flex; align-items: center; gap: 1.5rem; }
    .nav-user { font-size: 0.9rem; color: var(--text-gray); }
    .nav-user strong { color: var(--primary-light); }
    .btn-cart { background: linear-gradient(135deg, var(--primary), var(--primary-dark)); border: none; border-radius: var(--radius-sm); padding: 0.5rem 1rem; font-size: 0.85rem; font-weight: 600; color: white; cursor: pointer; text-decoration: none; display: flex; align-items: center; gap: 0.4rem; transition: all 0.3s ease; }
    .btn-cart:hover { transform: translateY(-2px); box-shadow: 0 5px 15px rgba(99,102,241,0.4); }
    .cart-count { background: var(--accent); color: var(--bg-dark); border-radius: 50%; width: 20px; height: 20px; font-size: 0.7rem; font-weight: 700; display: inline-flex; align-items: center; justify-content: center; }
    .btn-logout { background: transparent; border: 1.5px solid rgba(99,102,241,0.5); border-radius: var(--radius-sm); padding: 0.45rem 1rem; font-size: 0.85rem; color: var(--text-gray); cursor: pointer; transition: all 0.3s ease; }
    .btn-logout:hover { border-color: var(--primary); color: var(--primary-light); transform: translateY(-2px); }

    /* HERO */
    .hero { background: var(--bg-dark); padding: 3rem 2rem; text-align: center; position: relative; border-bottom: 1px solid rgba(99,102,241,0.2); }

    .hero h1 { font-family: var(--font-display); font-size: clamp(1.8rem, 4vw, 2.5rem); background: var(--gradient-hero); -webkit-background-clip: text; background-clip: text; color: transparent; margin-bottom: 0.5rem; }
    .hero h1 span { background: linear-gradient(135deg, var(--accent), var(--accent-glow)); -webkit-background-clip: text; background-clip: text; color: transparent; }
    .hero p { color: var(--text-gray); font-size: 0.95rem; }

    /* PARTNER BADGE in hero */

      background: linear-gradient(135deg, rgba(201,168,76,0.15), rgba(228,195,106,0.05));

      font-size: 0.78rem; font-weight: 600; color: var(--prestige-gold-light);

    @keyframes pulse { 0%,100% { opacity:1; } 50% { opacity:0.4; } }

    /* FILTRES */
    .filters-bar {
      background: rgba(15,15,31,0.8); backdrop-filter: blur(8px); border-bottom: 1px solid rgba(99,102,241,0.2);

    .filter-btn { background: transparent; border: 1.5px solid rgba(99,102,241,0.3); border-radius: 40px; padding: 0.4rem 1rem; font-size: 0.8rem; color: var(--text-gray); cursor: pointer; transition: all 0.2s; }
    .filter-btn:hover, .filter-btn.active { border-color: var(--primary); background: rgba(99,102,241,0.2); color: var(--primary-light); }
    .filter-btn.filter-prestige { border-color: rgba(201,168,76,0.4); }
    .filter-btn.filter-prestige:hover, .filter-btn.filter-prestige.active { border-color: var(--prestige-gold); background: rgba(201,168,76,0.15); color: var(--prestige-gold-light); }
    .search-input { background: rgba(255,255,255,0.05); border: 1.5px solid rgba(99,102,241,0.3); border-radius: 40px; padding: 0.45rem 1rem; font-size: 0.85rem; color: var(--text-white); outline: none; width: 220px; margin-left: auto; }

    .search-input::placeholder { color: rgba(161,161,170,0.6); }

    /* CATALOGUE */

    .section-title span { font-size: 0.85rem; font-weight: 400; color: var(--text-gray); font-family: var(--font-body); margin-left: 0.5rem; }

    /* SÉPARATEUR PRESTIGE */

    .prestige-divider-label {

    .prestige-divider-label img { height: 22px; filter: brightness(0) invert(1) sepia(1) saturate(3) hue-rotate(5deg); }

    .products-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(280px, 1fr)); gap: 1.8rem; }

    /* CARTE PRODUIT */
    .product-card { background: var(--card-bg); backdrop-filter: blur(10px); border: 1px solid rgba(99,102,241,0.2); border-radius: var(--radius-md); overflow: hidden; transition: all 0.3s ease; cursor: pointer; }
    .product-card:hover { transform: translateY(-6px); border-color: var(--primary); box-shadow: var(--shadow-glow); }
    /* Carte Prestige */
    .product-card.prestige { border-color: rgba(201,168,76,0.25); }
    .product-card.prestige:hover { border-color: var(--prestige-gold); box-shadow: var(--shadow-gold); }

    .color-preview { height: 150px; position: relative; display: flex; align-items: flex-end; justify-content: space-between; padding: 0.75rem; background-size: cover; background-position: center; }
    .color-preview-overlay { position: absolute; inset: 0; background: linear-gradient(to bottom, transparent 40%, rgba(0,0,0,0.5) 100%); }
    .color-hex { position: relative; z-index: 1; background: rgba(0,0,0,0.5); backdrop-filter: blur(4px); color: white; font-size: 0.7rem; font-family: monospace; padding: 0.2rem 0.5rem; border-radius: 6px; }
    .stock-badge { position: relative; z-index: 1; font-size: 0.7rem; font-weight: 600; padding: 0.2rem 0.6rem; border-radius: 40px; backdrop-filter: blur(4px); }
    .stock-ok { background: rgba(16,185,129,0.2); color: #6ee7b7; border: 1px solid rgba(16,185,129,0.4); }
    .stock-low { background: rgba(239,68,68,0.2); color: #fca5a5; border: 1px solid rgba(239,68,68,0.4); }

    /* Badge marque Prestige sur la card */
    .brand-badge {
      position: absolute; top: 0.6rem; left: 0.6rem; z-index: 2;
      background: linear-gradient(135deg, #c9a84c, #e4c36a);
      color: #0a0a1a; font-size: 0.6rem; font-weight: 700;
      padding: 0.15rem 0.5rem; border-radius: 4px; text-transform: uppercase; letter-spacing: 0.05em;
    }

    .card-body { padding: 1.2rem; }
    .card-type { font-size: 0.7rem; font-weight: 600; text-transform: uppercase; letter-spacing: 0.08em; color: var(--primary-light); margin-bottom: 0.4rem; }
    .card-type.prestige-type { color: var(--prestige-gold-light); }
    .card-name { font-family: var(--font-display); font-size: 1.1rem; color: var(--text-white); margin-bottom: 0.5rem; }
    .card-meta { display: flex; gap: 0.5rem; margin-bottom: 0.8rem; flex-wrap: wrap; }
    .meta-tag { background: rgba(255,255,255,0.05); border: 1px solid rgba(255,255,255,0.1); border-radius: 6px; font-size: 0.7rem; color: var(--text-gray); padding: 0.2rem 0.6rem; display: inline-flex; align-items: center; gap: 4px; }

    .card-footer { display: flex; align-items: center; justify-content: space-between; padding-top: 0.8rem; border-top: 1px solid rgba(99,102,241,0.2); }

    .card-price { font-family: var(--font-display); font-size: 1.2rem; color: var(--accent); }
    .card-price small { font-size: 0.7rem; color: var(--text-gray); }
    .btn-add { background: linear-gradient(135deg, var(--primary), var(--primary-dark)); border: none; border-radius: var(--radius-sm); padding: 0.45rem 1rem; font-size: 0.8rem; font-weight: 600; color: white; cursor: pointer; transition: all 0.3s ease; }
    .btn-add:hover { transform: translateY(-2px); box-shadow: 0 4px 12px rgba(99,102,241,0.4); }
    .btn-add.prestige-btn { background: linear-gradient(135deg, #c9a84c, #a8823a); }
    .btn-add.prestige-btn:hover { box-shadow: 0 4px 12px rgba(201,168,76,0.4); }

    /* LOADING & EMPTY */
    .loading { text-align: center; padding: 4rem; color: var(--text-gray); }
    .loading .spinner { width: 40px; height: 40px; border: 3px solid rgba(99,102,241,0.3); border-top-color: var(--primary); border-radius: 50%; animation: spin 0.8s linear infinite; margin: 0 auto 1rem; }
    @keyframes spin { to { transform: rotate(360deg); } }
    .empty-state { text-align: center; padding: 4rem; color: var(--text-gray); display: none; }
    .empty-state .material-icons { font-size: 48px; margin-bottom: 1rem; opacity: 0.5; }

    /* TOAST */
    .toast { position: fixed; bottom: 2rem; right: 2rem; background: var(--bg-surface); border: 1px solid var(--primary); color: var(--text-white); padding: 0.75rem 1.25rem; border-radius: var(--radius-sm); font-size: 0.85rem; z-index: 1000; animation: slideUp 0.3s ease; box-shadow: var(--shadow-glow); }
    @keyframes slideUp { from { opacity:0; transform: translateY(20px); } to { opacity:1; transform: translateY(0); } }

    @media (max-width: 768px) {
      .navbar { padding: 0.8rem 1.5rem; }
      .filters-bar { padding: 0.8rem 1rem; top: 60px; }
      .search-input { width: 100%; margin-left: 0; }
      .catalogue-section { padding: 1rem; }
    }
  </style>
</head>

  let currentFilter = 'tous';
  let searchTerm = '';
  let cart = JSON.parse(localStorage.getItem('cart') || '[]');

  async function loadProducts() {
    try {
      const res = await api.get('/produits');
      const data = await res.json();
      // Fusionner les produits API avec les produits Prestige Peinture
      allProducts = [
        ...data.map(p => ({ ...p, marque: 'local' })),
        ...prestigeProducts
      ];
      renderProducts(allProducts);
      document.getElementById('loadingState').style.display = 'none';
    } catch (err) {
      // Si l'API échoue, afficher quand même les produits Prestige
      allProducts = prestigeProducts;
      renderProducts(allProducts);
      document.getElementById('loadingState').style.display = 'none';
    }
  }

  function renderProducts(products) {
    const grid = document.getElementById('productsGrid');
    const empty = document.getElementById('emptyState');
    const count = document.getElementById('productCount');
    count.textContent = `(${products.length} produit${products.length > 1 ? 's' : ''})`;
    if (!products.length) {
      grid.innerHTML = '';
      empty.style.display = 'block';
      return;
    }
    empty.style.display = 'none';
    const typeLabel = { interieure: 'Intérieure', exterieure: 'Extérieure', impermeabilisante: 'Imperméabilisante' };

    grid.innerHTML = products.map(p => {
      const stockOk = parseFloat(p.stock_litres) > parseFloat(p.stock_minimum);
      const isPrestige = p.marque === 'prestige';

      if (isPrestige) {
        // Carte Prestige Peinture avec image de catalogue
        return `
          <div class="product-card prestige" onclick="openModal('${p.id}')">
            <div class="color-preview" style="background-image:url('${p.image}'); background-color:${p.couleur_code};">
              <div class="color-preview-overlay"></div>
              <span class="brand-badge">Prestige</span>
              <span class="color-hex">${p.couleur_code}</span>
              <span class="stock-badge ${stockOk ? 'stock-ok' : 'stock-low'}">
                ${stockOk ? '✓ En stock' : '⚠ Stock bas'}
              </span>
            </div>
            <div class="card-body">
              <div class="card-type prestige-type">✨ ${typeLabel[p.type] || p.type} — Prestige Peinture</div>
              <div class="card-name">${p.nom}</div>
              <div class="card-meta">
                <span class="meta-tag"><span class="material-icons">palette</span> ${p.finition}</span>
                <span class="meta-tag"><span class="material-icons">straighten</span> ${p.rendement_m2_L} m²/L</span>
                <span class="meta-tag"><span class="material-icons">inventory_2</span> ${p.stock_litres} L</span>
              </div>
              <div class="card-footer">
                <div class="card-price">${parseFloat(p.prix_litre).toFixed(3)}<small> DT/L</small></div>
                <button class="btn-add prestige-btn" onclick="event.stopPropagation(); openModal('${p.id}')">+ Simuler</button>
              </div>
            </div>
          </div>
        `;
      } else {
        // Carte produit local classique
        return `
          <div class="product-card" onclick="openModal(${p.id})">
            <div class="color-preview" style="background:${p.couleur_code || '#CCC'}">
              <span class="color-hex">${p.couleur_code || 'N/A'}</span>
              <span class="stock-badge ${stockOk ? 'stock-ok' : 'stock-low'}">
                ${stockOk ? '✓ En stock' : '⚠ Stock bas'}
              </span>
            </div>
            <div class="card-body">
              <div class="card-type">${typeLabel[p.type] || p.type}</div>
              <div class="card-name">${p.nom}</div>
              <div class="card-meta">
                <span class="meta-tag"><span class="material-icons">palette</span> ${p.finition || 'N/A'}</span>
                <span class="meta-tag"><span class="material-icons">straighten</span> ${p.rendement_m2_L} m²/L</span>
                <span class="meta-tag"><span class="material-icons">inventory_2</span> ${p.stock_litres} L</span>
              </div>
              <div class="card-footer">
                <div class="card-price">${parseFloat(p.prix_litre).toFixed(3)}<small> DT/L</small></div>
                <button class="btn-add" onclick="event.stopPropagation(); openModal(${p.id})">+ Simuler</button>
              </div>
            </div>
          </div>
        `;
      }
    }).join('');
  }

  function filterBy(type, btn) {
    currentFilter = type;
    document.querySelectorAll('.filter-btn').forEach(b => b.classList.remove('active'));
    btn.classList.add('active');
    applyFilters();
  }

  function searchProducts(term) {
    searchTerm = term.toLowerCase();
    applyFilters();
  }

  function applyFilters() {
    let filtered = allProducts;
    if (currentFilter === 'prestige') {
      filtered = filtered.filter(p => p.marque === 'prestige');
    } else if (currentFilter !== 'tous') {
      filtered = filtered.filter(p => p.type === currentFilter);
    }
    if (searchTerm) {
      filtered = filtered.filter(p =>
        p.nom.toLowerCase().includes(searchTerm) ||
        p.type.toLowerCase().includes(searchTerm) ||
        (p.finition || '').toLowerCase().includes(searchTerm)
      );
    }
    renderProducts(filtered);
  }

  function openModal(productId) {
    const product = allProducts.find(p => String(p.id) === String(productId));
    if (!product) return;
    localStorage.setItem('selectedProduct', JSON.stringify(product));
    window.location.href = 'simulateur.html';
  }

  function updateCartCount() {
    document.getElementById('cartCount').textContent = cart.length;
  }

  function showToast(msg) {
    const toast = document.createElement('div');
    toast.className = 'toast';
    toast.innerHTML = msg;
    document.body.appendChild(toast);
    setTimeout(() => toast.remove(), 3000);
  }

  function logout() {
    localStorage.removeItem('token');
    localStorage.removeItem('refreshToken');
    localStorage.removeItem('user');
    window.location.href = '/login-client.html';
  }

  updateCartCount();
  loadProducts();
</script>
</body>
</html>
