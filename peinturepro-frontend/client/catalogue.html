<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>PeinturePro TN — Catalogue</title>
  <link rel="stylesheet" href="../css/main.css"/>
  <style>
    /* ===== Layout ===== */
    body { background: var(--surface); min-height: 100vh; }

    /* ===== Navbar ===== */
    .navbar {
      background: var(--white);
      border-bottom: 1.5px solid var(--border);
      padding: 0 2rem;
      height: 64px;
      display: flex;
      align-items: center;
      justify-content: space-between;
      position: sticky;
      top: 0;
      z-index: 100;
      box-shadow: var(--shadow-sm);
    }
    .nav-brand {
      font-family: var(--font-display);
      font-size: 1.2rem;
      color: var(--dark);
    }
    .nav-brand span { color: var(--primary); }
    .nav-right {
      display: flex;
      align-items: center;
      gap: 1.25rem;
    }
    .nav-user {
      font-size: .88rem;
      color: var(--text-muted);
    }
    .nav-user strong { color: var(--text); }
    .btn-cart {
      position: relative;
      background: var(--primary);
      color: white;
      border: none;
      border-radius: var(--radius-sm);
      padding: .5rem 1rem;
      font-size: .88rem;
      font-weight: 600;
      cursor: pointer;
      text-decoration: none;
      display: flex;
      align-items: center;
      gap: .4rem;
    }
    .cart-count {
      background: var(--accent);
      color: var(--dark);
      border-radius: 50%;
      width: 18px; height: 18px;
      font-size: .7rem;
      font-weight: 700;
      display: flex;
      align-items: center;
      justify-content: center;
    }
    .btn-logout {
      background: none;
      border: 1.5px solid var(--border);
      border-radius: var(--radius-sm);
      padding: .45rem .9rem;
      font-size: .82rem;
      color: var(--text-muted);
      cursor: pointer;
    }
    .btn-logout:hover { border-color: var(--primary); color: var(--primary); }

    /* ===== Hero ===== */
    .hero {
      background: var(--dark);
      padding: 3rem 2rem;
      text-align: center;
      position: relative;
      overflow: hidden;
    }
    .hero::before {
      content: '';
      position: absolute;
      inset: 0;
      background: radial-gradient(ellipse 70% 60% at 50% 50%, rgba(200,68,26,.35) 0%, transparent 70%);
    }
    .hero-content { position: relative; z-index: 1; }
    .hero h1 {
      font-family: var(--font-display);
      font-size: clamp(1.8rem, 4vw, 2.8rem);
      color: white;
      margin-bottom: .5rem;
    }
    .hero h1 span { color: var(--accent); }
    .hero p { color: rgba(255,255,255,.6); font-size: .95rem; }

    /* ===== Filtres ===== */
    .filters-bar {
      background: var(--white);
      border-bottom: 1px solid var(--border);
      padding: 1rem 2rem;
      display: flex;
      align-items: center;
      gap: 1rem;
      flex-wrap: wrap;
    }
    .filter-label {
      font-size: .8rem;
      font-weight: 600;
      color: var(--text-muted);
      text-transform: uppercase;
      letter-spacing: .06em;
    }
    .filter-btn {
      border: 1.5px solid var(--border);
      background: var(--surface);
      border-radius: 30px;
      padding: .35rem .9rem;
      font-size: .82rem;
      color: var(--text-muted);
      cursor: pointer;
      transition: all .2s;
    }
    .filter-btn:hover, .filter-btn.active {
      border-color: var(--primary);
      background: var(--primary-light);
      color: var(--primary);
      font-weight: 600;
    }
    .search-input {
      margin-left: auto;
      padding: .4rem .9rem;
      border: 1.5px solid var(--border);
      border-radius: 30px;
      font-size: .85rem;
      outline: none;
      width: 220px;
    }
    .search-input:focus { border-color: var(--primary); }

    /* ===== Grille produits ===== */
    .catalogue-section {
      max-width: 1200px;
      margin: 0 auto;
      padding: 2rem;
    }
    .section-title {
      font-family: var(--font-display);
      font-size: 1.3rem;
      color: var(--dark);
      margin-bottom: 1.5rem;
    }
    .section-title span {
      font-size: .85rem;
      font-weight: 400;
      color: var(--text-muted);
      font-family: var(--font-body);
      margin-left: .5rem;
    }

    .products-grid {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(260px, 1fr));
      gap: 1.5rem;
    }

    /* ===== Card produit ===== */
    .product-card {
      background: var(--white);
      border-radius: var(--radius-md);
      overflow: hidden;
      box-shadow: var(--shadow-sm);
      transition: transform .2s, box-shadow .2s;
      cursor: pointer;
    }
    .product-card:hover {
      transform: translateY(-4px);
      box-shadow: var(--shadow-md);
    }
    .color-preview {
      height: 140px;
      position: relative;
      display: flex;
      align-items: flex-end;
      padding: .75rem;
    }
    .color-hex {
      background: rgba(0,0,0,.3);
      color: white;
      font-size: .72rem;
      font-family: monospace;
      padding: .2rem .5rem;
      border-radius: 4px;
      backdrop-filter: blur(4px);
    }
    .stock-badge {
      position: absolute;
      top: .75rem;
      right: .75rem;
      font-size: .7rem;
      font-weight: 600;
      padding: .2rem .6rem;
      border-radius: 30px;
    }
    .stock-ok  { background: rgba(46,204,113,.15); color: #1D6A42; border: 1px solid rgba(46,204,113,.3); }
    .stock-low { background: rgba(231,76,60,.15);  color: #9E3312; border: 1px solid rgba(231,76,60,.3); }

    .card-body { padding: 1.1rem; }
    .card-type {
      font-size: .72rem;
      font-weight: 600;
      text-transform: uppercase;
      letter-spacing: .08em;
      color: var(--primary);
      margin-bottom: .3rem;
    }
    .card-name {
      font-family: var(--font-display);
      font-size: 1.1rem;
      color: var(--dark);
      margin-bottom: .5rem;
    }
    .card-meta {
      display: flex;
      gap: .5rem;
      margin-bottom: .75rem;
      flex-wrap: wrap;
    }
    .meta-tag {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 4px;
      font-size: .72rem;
      color: var(--text-muted);
      padding: .15rem .5rem;
    }
    .card-footer {
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding-top: .75rem;
      border-top: 1px solid var(--border);
    }
    .card-price {
      font-family: var(--font-display);
      font-size: 1.2rem;
      color: var(--primary);
    }
    .card-price small {
      font-size: .7rem;
      color: var(--text-muted);
      font-family: var(--font-body);
    }
    .btn-add {
      background: var(--primary);
      color: white;
      border: none;
      border-radius: var(--radius-sm);
      padding: .45rem .9rem;
      font-size: .82rem;
      font-weight: 600;
      cursor: pointer;
      transition: background .2s;
    }
    .btn-add:hover { background: var(--primary-dark); }

    /* ===== Loading ===== */
    .loading {
      text-align: center;
      padding: 4rem;
      color: var(--text-muted);
    }
    .loading .spinner {
      width: 36px; height: 36px;
      border: 3px solid var(--border);
      border-top-color: var(--primary);
      border-radius: 50%;
      animation: spin .8s linear infinite;
      margin: 0 auto 1rem;
    }

    /* ===== Empty state ===== */
    .empty-state {
      text-align: center;
      padding: 4rem;
      color: var(--text-muted);
      display: none;
    }
    .empty-state svg { margin-bottom: 1rem; opacity: .3; }

    /* ===== Modal Simulateur rapide ===== */
    .modal-overlay {
      position: fixed;
      inset: 0;
      background: rgba(0,0,0,.5);
      display: flex;
      align-items: center;
      justify-content: center;
      z-index: 200;
      display: none;
    }
    .modal-overlay.open { display: flex; }
    .modal {
      background: var(--white);
      border-radius: var(--radius-lg);
      padding: 2rem;
      width: 100%;
      max-width: 420px;
      box-shadow: var(--shadow-lg);
      animation: slideUp .3s cubic-bezier(.16,1,.3,1);
    }
    .modal-header {
      display: flex;
      align-items: center;
      justify-content: space-between;
      margin-bottom: 1.5rem;
    }
    .modal-title {
      font-family: var(--font-display);
      font-size: 1.3rem;
      color: var(--dark);
    }
    .modal-close {
      background: none;
      border: none;
      font-size: 1.3rem;
      cursor: pointer;
      color: var(--text-muted);
    }
    .color-swatch {
      width: 100%;
      height: 80px;
      border-radius: var(--radius-sm);
      margin-bottom: 1.25rem;
    }
    .result-box {
      background: var(--primary-light);
      border: 1.5px solid rgba(200,68,26,.2);
      border-radius: var(--radius-sm);
      padding: 1rem;
      text-align: center;
      margin: 1rem 0;
      display: none;
    }
    .result-box.show { display: block; }
    .result-litres {
      font-family: var(--font-display);
      font-size: 2rem;
      color: var(--primary);
    }
    .result-prix {
      font-size: .9rem;
      color: var(--text-muted);
      margin-top: .25rem;
    }

    @keyframes slideUp {
      from { opacity: 0; transform: translateY(20px); }
      to   { opacity: 1; transform: translateY(0); }
    }

    @media (max-width: 600px) {
      .filters-bar { padding: .75rem 1rem; }
      .catalogue-section { padding: 1rem; }
      .search-input { width: 100%; margin-left: 0; }
    }
  </style>
</head>
<body>

  <!-- ===== Navbar ===== -->
  <nav class="navbar">
    <div class="nav-brand">PeinturePro <span>TN</span></div>
    <div class="nav-right">
      <span class="nav-user">Bonjour, <strong id="userName">...</strong></span>
      <a href="commande.html" class="btn-cart">
        🛒 Panier
        <span class="cart-count" id="cartCount">0</span>
      </a>
      <button class="btn-logout" onclick="logout()">Déconnexion</button>
    </div>
  </nav>
  

  <!-- ===== Hero ===== -->
  <div class="hero">
    <div class="hero-content">
      <h1>Notre <span>Catalogue</span></h1>
      <p>Peintures intérieures, extérieures et imperméabilisantes — qualité tunisienne</p>
    </div>
  </div>

  <!-- ===== Filtres ===== -->
  <div class="filters-bar">
    <span class="filter-label">Filtrer :</span>
    <button class="filter-btn active" onclick="filterBy('tous', this)">Tous</button>
    <button class="filter-btn" onclick="filterBy('interieure', this)">Intérieure</button>
    <button class="filter-btn" onclick="filterBy('exterieure', this)">Extérieure</button>
    <button class="filter-btn" onclick="filterBy('impermeabilisante', this)">Imperméabilisante</button>
    <input type="text" class="search-input" placeholder="🔍 Rechercher une peinture..." oninput="searchProducts(this.value)"/>
  </div>

  <!-- ===== Catalogue ===== -->
  <section class="catalogue-section">
    <h2 class="section-title">
      Nos peintures
      <span id="productCount"></span>
    </h2>

    <div id="loadingState" class="loading">
      <div class="spinner"></div>
      Chargement du catalogue...
    </div>

    <div class="products-grid" id="productsGrid"></div>

    <div class="empty-state" id="emptyState">
      <svg width="60" height="60" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5">
        <circle cx="11" cy="11" r="8"/><path d="m21 21-4.35-4.35"/>
      </svg>
      <p>Aucun produit trouvé.</p>
    </div>
  </section>

  <!-- ===== Modal Simulateur ===== -->
  <div class="modal-overlay" id="modalOverlay" onclick="closeModal(event)">
    <div class="modal">
      <div class="modal-header">
        <span class="modal-title" id="modalTitle">Simulateur</span>
        <button class="modal-close" onclick="closeModalDirect()">✕</button>
      </div>
      <div class="color-swatch" id="modalSwatch"></div>
      <div class="form-group">
        <label>Surface à peindre (m²)</label>
        <input type="number" class="form-control" id="surfaceInput"
               placeholder="ex: 25" min="1" oninput="calculateLitres()"/>
      </div>
      <div class="form-group">
        <label>Nombre de couches</label>
        <select class="form-control" id="couchesInput" onchange="calculateLitres()">
          <option value="1">1 couche</option>
          <option value="2" selected>2 couches</option>
          <option value="3">3 couches</option>
        </select>
      </div>
      <div class="result-box" id="resultBox">
        <div class="result-litres"><span id="resultLitres">0</span> L</div>
        <div class="result-prix" id="resultPrix"></div>
      </div>
      <button class="btn-primary w-100 mt-2" onclick="addToCart()">
        Ajouter au panier
      </button>
    </div>
  </div>

  <script src="../js/api.js"></script>
  <script src="../js/auth.js"></script>
  <script>
    // Guard
    requireAuth(['client']);
    displayUserInfo('#userName');

    let allProducts  = [];
    let currentFilter = 'tous';
    let searchTerm    = '';
    let selectedProduct = null;
    let cart = JSON.parse(localStorage.getItem('cart') || '[]');

    // ===== Charger les produits =====
    async function loadProducts() {
      try {
        const res  = await api.get('/produits');
        const data = await res.json();
        allProducts = data;
        renderProducts(data);
        document.getElementById('loadingState').style.display = 'none';
      } catch (err) {
        document.getElementById('loadingState').innerHTML = '❌ Erreur de chargement.';
      }
    }

    // ===== Afficher les produits =====
    function renderProducts(products) {
      const grid  = document.getElementById('productsGrid');
      const empty = document.getElementById('emptyState');
      const count = document.getElementById('productCount');

      count.textContent = `(${products.length} produit${products.length > 1 ? 's' : ''})`;

      if (!products.length) {
        grid.innerHTML = '';
        empty.style.display = 'block';
        return;
      }
      empty.style.display = 'none';

      grid.innerHTML = products.map(p => {
        const stockOk  = parseFloat(p.stock_litres) > parseFloat(p.stock_minimum);
        const typeLabel = { interieure: 'Intérieure', exterieure: 'Extérieure', impermeabilisante: 'Imperméabilisante' };
        return `
          <div class="product-card" onclick="openModal(${p.id})">
            <div class="color-preview" style="background:${p.couleur_code || '#CCC'}">
              <span class="color-hex">${p.couleur_code || 'N/A'}</span>
              <span class="stock-badge ${stockOk ? 'stock-ok' : 'stock-low'}">
                ${stockOk ? '✓ En stock' : '⚠ Stock bas'}
              </span>
            </div>
            <div class="card-body">
              <div class="card-type">${typeLabel[p.type] || p.type}</div>
              <div class="card-name">${p.nom}</div>
              <div class="card-meta">
                <span class="meta-tag">🎨 ${p.finition || 'N/A'}</span>
                <span class="meta-tag">📐 ${p.rendement_m2_L} m²/L</span>
                <span class="meta-tag">📦 ${p.stock_litres} L</span>
              </div>
              <div class="card-footer">
                <div class="card-price">
                  ${parseFloat(p.prix_litre).toFixed(3)}
                  <small>DT/L</small>
                </div>
                <button class="btn-add" onclick="event.stopPropagation(); openModal(${p.id})">
                  + Simuler
                </button>
              </div>
            </div>
          </div>
        `;
      }).join('');
    }

    // ===== Filtres =====
    function filterBy(type, btn) {
      currentFilter = type;
      document.querySelectorAll('.filter-btn').forEach(b => b.classList.remove('active'));
      btn.classList.add('active');
      applyFilters();
    }

    function searchProducts(term) {
      searchTerm = term.toLowerCase();
      applyFilters();
    }

    function applyFilters() {
      let filtered = allProducts;
      if (currentFilter !== 'tous') {
        filtered = filtered.filter(p => p.type === currentFilter);
      }
      if (searchTerm) {
        filtered = filtered.filter(p =>
          p.nom.toLowerCase().includes(searchTerm) ||
          p.type.toLowerCase().includes(searchTerm)
        );
      }
      renderProducts(filtered);
    }

    // ===== Modal Simulateur =====
function openModal(productId) {
  const product = allProducts.find(p => p.id === productId);
  if (!product) return;

  // Sauvegarder le produit sélectionné et rediriger vers simulateur
  localStorage.setItem('selectedProduct', JSON.stringify(product));
  window.location.href = 'simulateur.html';
}

    function closeModal(e) {
      if (e.target === document.getElementById('modalOverlay')) closeModalDirect();
    }
    function closeModalDirect() {
      document.getElementById('modalOverlay').classList.remove('open');
    }

    // ===== Calcul Litres =====
    function calculateLitres() {
      const surface  = parseFloat(document.getElementById('surfaceInput').value);
      const couches  = parseInt(document.getElementById('couchesInput').value);
      if (!surface || !selectedProduct) return;

      const litres = (surface * couches) / parseFloat(selectedProduct.rendement_m2_L);
      const prix   = litres * parseFloat(selectedProduct.prix_litre);

      document.getElementById('resultLitres').textContent = litres.toFixed(2);
      document.getElementById('resultPrix').textContent   =
        `≈ ${prix.toFixed(3)} DT — ${couches} couche${couches > 1 ? 's' : ''}`;
      document.getElementById('resultBox').classList.add('show');
    }

    // ===== Ajouter au panier =====
    function addToCart() {
      const surface = parseFloat(document.getElementById('surfaceInput').value);
      const couches = parseInt(document.getElementById('couchesInput').value);
      if (!surface) { alert('Entrez une surface.'); return; }

      const litres = (surface * couches) / parseFloat(selectedProduct.rendement_m2_L);
      if (litres < 5) { alert('Minimum 5 litres requis.'); return; }

      const item = {
        produit_id:      selectedProduct.id,
        nom:             selectedProduct.nom,
        couleur_code:    selectedProduct.couleur_code,
        surface_m2:      surface,
        couches,
        litres_calcules: parseFloat(litres.toFixed(2)),
        prix_litre:      parseFloat(selectedProduct.prix_litre),
        montant:         parseFloat((litres * selectedProduct.prix_litre).toFixed(3))
      };

      cart.push(item);
      localStorage.setItem('cart', JSON.stringify(cart));
      updateCartCount();
      closeModalDirect();
      showToast(`✓ ${selectedProduct.nom} ajouté au panier`);
    }

    // ===== Cart count =====
    function updateCartCount() {
      document.getElementById('cartCount').textContent = cart.length;
    }

    // ===== Toast =====
    function showToast(msg) {
      const t = document.createElement('div');
      t.style.cssText = `
        position:fixed; bottom:2rem; right:2rem;
        background:var(--dark); color:white;
        padding:.75rem 1.25rem; border-radius:var(--radius-sm);
        font-size:.88rem; z-index:999;
        animation: slideUp .3s ease;
        box-shadow: var(--shadow-md);
      `;
      t.textContent = msg;
      document.body.appendChild(t);
      setTimeout(() => t.remove(), 3000);
    }

    // Init
    updateCartCount();
    loadProducts();
  </script>
</body>
</html>
